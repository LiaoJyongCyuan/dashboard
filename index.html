<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日儀表板</title>
<style>
  :root {
    --text: #2C2C2B;
    --text2: #7D7A75;
    --seg-empty: #F0EFED;
    --dot-ring: rgba(0,0,0,0.18);
    --dot-blue: #A9CDEC;
    --dot-green: #A8D3B8;
    --dot-amber: #E9CF95;
    --dot-lav: #C9B8E4;
    --dot-rose: #E9BCC8;
    --dot-teal: #A8D3D1;
    --seg-fill-a: #BFD9F2;
    --seg-fill-b: #8FBBE8;
    --chip-bg: #EAF3FB;
    --chip-text: #5B8FC7;
    /* 星期燈：平日柿橘、週末灰玫瑰，亮燈皆實心白字、同尺寸 */
    --wd-on: #E8683C;
    --wd-on-wknd: #C77E92;
    --wd-off-bg: #FCEFE5;
    --wd-off-text: #C68C66;
    --wd-off-bg-wknd: #F9EEF1;
    --wd-off-text-wknd: #C99AA6;
    /* 年度天數標籤：扁平內斂 */
    --doy-text: #8C8983;
    /* 分區細線 */
    --divider: rgba(0,0,0,0.12);
  }
  :root[data-theme="green"] {
    --seg-fill-a: #C2E0CE;
    --seg-fill-b: #85C29F;
    --chip-bg: #E9F4EE;
    --chip-text: #4F9C74;
  }
  :root[data-theme="amber"] {
    --seg-fill-a: #F0DFB6;
    --seg-fill-b: #DFBE72;
    --chip-bg: #FAF2DF;
    --chip-text: #A98938;
  }
  :root[data-theme="lav"] {
    --seg-fill-a: #DCD2EE;
    --seg-fill-b: #B29BDC;
    --chip-bg: #F2EEFA;
    --chip-text: #8A6FC0;
  }
  :root[data-theme="rose"] {
    --seg-fill-a: #F1D3DB;
    --seg-fill-b: #DFA0B2;
    --chip-bg: #FAEFF2;
    --chip-text: #BC7089;
  }
  :root[data-theme="teal"] {
    --seg-fill-a: #C5E3E1;
    --seg-fill-b: #82C6C3;
    --chip-bg: #E9F5F4;
    --chip-text: #4E9C99;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #FFFFFF;
      --text2: rgba(255,255,255,0.65);
      --seg-empty: rgba(255,255,255,0.13);
      --dot-ring: rgba(255,255,255,0.35);
      --seg-fill-a: rgba(94,159,232,0.45);
      --seg-fill-b: rgba(94,159,232,0.85);
      --chip-bg: rgba(94,159,232,0.14);
      --chip-text: #8FB8E8;
      --wd-on: #E97C4E;
      --wd-on-wknd: #C9798F;
      --wd-off-bg: rgba(233,124,78,0.14);
      --wd-off-text: rgba(238,158,120,0.78);
      --wd-off-bg-wknd: rgba(223,160,178,0.13);
      --wd-off-text-wknd: rgba(233,182,196,0.75);
      --doy-text: rgba(255,255,255,0.62);
      --divider: rgba(255,255,255,0.18);
    }
    :root[data-theme="green"] {
      --seg-fill-a: rgba(114,188,143,0.45);
      --seg-fill-b: rgba(114,188,143,0.85);
      --chip-bg: rgba(114,188,143,0.14);
      --chip-text: #93CDA9;
    }
    :root[data-theme="amber"] {
      --seg-fill-a: rgba(224,190,114,0.45);
      --seg-fill-b: rgba(224,190,114,0.85);
      --chip-bg: rgba(224,190,114,0.14);
      --chip-text: #DCC183;
    }
    :root[data-theme="lav"] {
      --seg-fill-a: rgba(178,155,220,0.45);
      --seg-fill-b: rgba(178,155,220,0.85);
      --chip-bg: rgba(178,155,220,0.14);
      --chip-text: #C3B0E4;
    }
    :root[data-theme="rose"] {
      --seg-fill-a: rgba(223,160,178,0.45);
      --seg-fill-b: rgba(223,160,178,0.85);
      --chip-bg: rgba(223,160,178,0.14);
      --chip-text: #E4B3C1;
    }
    :root[data-theme="teal"] {
      --seg-fill-a: rgba(130,198,195,0.45);
      --seg-fill-b: rgba(130,198,195,0.85);
      --chip-bg: rgba(130,198,195,0.14);
      --chip-text: #9AD0CD;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: transparent; }
  body {
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 24px;
  }
  .wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .main {
    flex: 1 1 auto;
    min-width: 0;
  }
  /* ---- top line: date + day ring + time ---- */
  .line {
    display: flex;
    align-items: baseline;
    gap: 9px;
    flex-wrap: wrap;
  }
  .date {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  /* 星期標籤：與「第 N 天」同家族，平日柿橘、週末灰玫瑰 */
  .wd-chip {
    background: var(--wd-off-bg);
    color: var(--wd-on);
    border-radius: 4px;
    padding: 0 5px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
  }
  .wd-chip.wknd {
    background: var(--wd-off-bg-wknd);
    color: var(--wd-on-wknd);
  }
  body.ready .wd-chip { transition: background 0.3s ease, color 0.3s ease; }
  /* ---- 分區細線：時間與週曆之間 ---- */
  .vdiv {
    flex: 0 0 auto;
    align-self: center;
    width: 1px;
    height: 30px;
    border-radius: 0.5px;
    background: var(--divider);
  }
  /* ---- 迷你雙週曆（時間與主題色點之間） ---- */
  .weekcal {
    flex: 0 0 auto;
    align-self: center;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .wc-row {
    display: grid;
    grid-template-columns: repeat(7, 18px);
    gap: 2px;
    justify-items: center;
    align-items: center;
  }
  .wc-head span {
    font-size: 9px;
    font-weight: 600;
    line-height: 1;
    color: var(--text2);
    user-select: none;
  }
  .wc-head span.wknd { color: var(--wd-off-text-wknd); }
  .wc-days span {
    width: 18px;
    height: 15px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--text2);
    user-select: none;
  }
  .wc-days span.wknd { color: var(--wd-off-text-wknd); }
  .wc-days span.today { background: var(--wd-on); color: #FFFFFF; }
  .wc-days span.today.wknd { background: var(--wd-on-wknd); }
  .doy-chip {
    background: var(--seg-empty);
    color: var(--doy-text);
    border-radius: 4px;
    padding: 0 5px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
  }
  /* ---- 天氣膠囊：與「第 N 天」同家族 ---- */
  .wx-chip {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: var(--chip-bg);
    border-radius: 4px;
    padding: 0 6px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .wx-chip[hidden] { display: none; }
  .wx-ic {
    font-size: 11px;
    line-height: 15px;
  }
  .wx-t { font-weight: 600; }
  .wx-item {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .wx-up { color: #C4483F; font-weight: 600; }
  .wx-down { color: #3A8A5F; font-weight: 600; }
  .wx-flat { color: var(--text2); font-weight: 600; }
  .wx-lab { color: var(--text2); font-weight: 500; }
  .wx-aqi-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #9AA0A6;
    flex: 0 0 auto;
  }
  .time-group {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    align-self: center;
  }
  .dayring {
    display: block;
    transform: rotate(-90deg);
  }
  .ring-base {
    fill: var(--chip-bg);
  }
  .ring-fill {
    fill: none;
    stroke: var(--seg-fill-b);
    stroke-width: 9;
  }
  body.ready .ring-fill { transition: stroke-dasharray 0.8s ease; }
  .time {
    font-size: 21px;
    font-weight: 650;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .time .sec {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
  }
  /* ---- segmented year progress ---- */
  .bar-row {
    margin-top: 9px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .bar-label {
    flex: 0 0 auto;
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }
  .segments {
    flex: 1 1 auto;
    display: flex;
    gap: 3px;
    height: 6px;
  }
  .seg {
    flex: 1 1 0;
    background: var(--seg-empty);
    border-radius: 3px;
    overflow: hidden;
  }
  .seg-inner {
    display: block;
    height: 100%;
    width: 0%;
    border-radius: inherit;
  }
  body.ready .seg-inner { transition: width 0.8s ease; }
  .bar-pct {
    flex: 0 0 auto;
    font-size: 11px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    text-align: right;
    white-space: nowrap;
  }
  /* ---- theme dots (right edge) ---- */
  .dots {
    flex: 0 0 auto;
    display: grid;
    grid-template-rows: repeat(3, auto);
    grid-auto-flow: column;
    gap: 3px;
  }
  .dot {
    width: 11px;
    height: 11px;
    border: none;
    background: transparent;
    padding: 0;
    position: relative;
    cursor: pointer;
  }
  .dot::before {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--c);
    opacity: 0.8;
    transition: opacity 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .dot:hover::before { opacity: 1; transform: scale(1.12); }
  .dot.active::before {
    opacity: 1;
    box-shadow: 0 0 0 2px var(--dot-ring);
  }
  .dot:focus-visible { outline: none; }
  .dot:focus-visible::before { box-shadow: 0 0 0 2px var(--dot-ring), 0 0 0 4px var(--chip-bg); }
  .dot-blue  { --c: var(--dot-blue); }
  .dot-green { --c: var(--dot-green); }
  .dot-amber { --c: var(--dot-amber); }
  .dot-lav   { --c: var(--dot-lav); }
  .dot-rose  { --c: var(--dot-rose); }
  .dot-teal  { --c: var(--dot-teal); }
  @media (max-width: 480px) {
    body { padding: 8px 16px; }
    .time { font-size: 19px; }
    .segments { gap: 2px; }
    .doy-chip { display: none; }
    .wx-chip .wx-lab { display: none; }
    .weekcal, .vdiv { display: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="main">
      <div class="line">
        <span class="date" id="date">—</span>
        <span class="wd-chip" id="wdchip" role="img" aria-label="星期">—</span>
        <span class="doy-chip" id="yearline">—</span>
        <span class="wx-chip" id="wx" hidden role="img" aria-label="台中即時天氣">
          <span class="wx-item"><span class="wx-ic" id="wxIcon">—</span><span class="wx-t" id="wxTemp">--°</span></span>
          <span class="wx-item"><span class="wx-lab">☔</span><span id="wxRain">--%</span></span>
          <span class="wx-item"><span class="wx-aqi-dot" id="wxAqiDot" aria-hidden="true"></span><span id="wxAqi">--</span></span>
        </span>
        <span class="wx-chip" id="tw" hidden role="img" aria-label="台股加權指數">
          <span class="wx-item"><span class="wx-lab">加權</span><span class="wx-t" id="twVal">--</span></span>
          <span class="wx-item wx-flat" id="twChg">--</span>
        </span>
        <span class="time-group">
          <svg class="dayring" id="weekring" viewBox="0 0 20 20" width="19" height="19" role="img" aria-label="本週進度">
            <title id="weekTitle">本週進度</title>
            <circle class="ring-base" cx="10" cy="10" r="9"></circle>
            <circle class="ring-fill week" id="weekFill" cx="10" cy="10" r="4.5"></circle>
          </svg>
          <svg class="dayring" id="dayring" viewBox="0 0 20 20" width="19" height="19" role="img" aria-label="今日進度">
            <title id="ringTitle">今日進度</title>
            <circle class="ring-base" cx="10" cy="10" r="9"></circle>
            <circle class="ring-fill" id="ringFill" cx="10" cy="10" r="4.5"></circle>
          </svg>
          <span class="time"><span id="hm">--:--</span> <span class="sec" id="ss">--</span></span>
        </span>
      </div>
      <div class="bar-row">
        <span class="bar-label">今年</span>
        <span class="segments" id="segments" role="progressbar" aria-label="今年進度" aria-valuemin="0" aria-valuemax="100"></span>
        <span class="bar-pct" id="yearpct">--%</span>
      </div>
    </div>
    <div class="vdiv" aria-hidden="true"></div>
    <div class="weekcal" id="weekcal" role="img" aria-label="雙週日曆">
      <div class="wc-row wc-head" aria-hidden="true">
        <span class="wknd">日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span class="wknd">六</span>
      </div>
      <div class="wc-row wc-days" id="wcdays"></div>
    </div>
    <div class="dots" role="group" aria-label="主題顏色">
      <button type="button" class="dot dot-blue" data-theme="blue" aria-label="淡藍主題"></button>
      <button type="button" class="dot dot-green" data-theme="green" aria-label="淡綠主題"></button>
      <button type="button" class="dot dot-amber" data-theme="amber" aria-label="淡黃主題"></button>
      <button type="button" class="dot dot-lav" data-theme="lav" aria-label="淡紫主題"></button>
      <button type="button" class="dot dot-rose" data-theme="rose" aria-label="淡粉主題"></button>
      <button type="button" class="dot dot-teal" data-theme="teal" aria-label="淡青主題"></button>
    </div>
  </div>

<script>
(function () {
  "use strict";
  var WEEKDAYS = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
  var SEG_COUNT = 12; /* 12 個月，上色處即當月進度 */
  var THEMES = ["blue", "green", "amber", "lav", "rose", "teal"];
  var RING_C = 2 * Math.PI * 4.5;
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function setText(id, v) { document.getElementById(id).textContent = v; }

  var segContainer = document.getElementById("segments");
  var ringFill = document.getElementById("ringFill");
  var weekFill = document.getElementById("weekFill");
  var wdChip = document.getElementById("wdchip");
  var wcDays = document.getElementById("wcdays");
  var weekcal = document.getElementById("weekcal");
  var lastDateKey = "";
  var fills = [];
  var styles = getComputedStyle(document.documentElement);

  function parseColor(v) {
    var s = v.trim();
    if (s.charAt(0) === "#") {
      return [parseInt(s.substr(1, 2), 16), parseInt(s.substr(3, 2), 16), parseInt(s.substr(5, 2), 16), 1];
    }
    var m = s.match(/rgba?\(([^)]+)\)/);
    if (m) {
      var p = m[1].split(",").map(parseFloat);
      return [p[0], p[1], p[2], p.length > 3 ? p[3] : 1];
    }
    return [143, 187, 232, 1];
  }
  function mix(a, b, t) {
    var r = [];
    for (var i = 0; i < 4; i++) r[i] = a[i] + (b[i] - a[i]) * t;
    return "rgba(" + Math.round(r[0]) + "," + Math.round(r[1]) + "," + Math.round(r[2]) + "," + r[3].toFixed(3) + ")";
  }
  function buildSegments() {
    var ca = parseColor(styles.getPropertyValue("--seg-fill-a"));
    var cb = parseColor(styles.getPropertyValue("--seg-fill-b"));
    segContainer.innerHTML = "";
    fills = [];
    for (var i = 0; i < SEG_COUNT; i++) {
      var seg = document.createElement("span");
      seg.className = "seg";
      var inner = document.createElement("span");
      inner.className = "seg-inner";
      inner.style.background = mix(ca, cb, SEG_COUNT === 1 ? 0 : i / (SEG_COUNT - 1));
      seg.appendChild(inner);
      segContainer.appendChild(seg);
      fills.push(inner);
    }
  }

  function tick() {
    var now = new Date();
    setText("hm", pad(now.getHours()) + ":" + pad(now.getMinutes()));
    setText("ss", pad(now.getSeconds()));
    setText("date", now.getFullYear() + " 年 " + (now.getMonth() + 1) + " 月 " + now.getDate() + " 日");
    var day = now.getDay();
    wdChip.textContent = WEEKDAYS[day];
    wdChip.classList.toggle("wknd", day === 0 || day === 6);
    wdChip.setAttribute("aria-label", "今天" + WEEKDAYS[day]);

    // 迷你週曆：換日才重建
    var dateKey = now.getFullYear() + "-" + now.getMonth() + "-" + now.getDate();
    if (dateKey !== lastDateKey) {
      lastDateKey = dateKey;
      wcDays.innerHTML = "";
      var ws = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day);
      for (var d = 0; d < 14; d++) {
        var cell = new Date(ws.getFullYear(), ws.getMonth(), ws.getDate() + d);
        var el = document.createElement("span");
        el.textContent = cell.getDate();
        var col = d % 7;
        if (col === 0 || col === 6) el.classList.add("wknd");
        if (d === day) el.classList.add("today");
        wcDays.appendChild(el);
      }
      weekcal.setAttribute("aria-label", "雙週日曆，今天 " + (now.getMonth() + 1) + " 月 " + now.getDate() + " 日" + WEEKDAYS[day]);
    }

    var dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
    setText("yearline", "第 " + dayOfYear + " 天");

    // 今日進度：12 小時一輪。0-12 時由缺到滿；12-24 時由滿到缺（皆順時針推進）
    var midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var hrs = (now - midnight) / 3600000;
    var ringRatio = hrs < 12 ? hrs / 12 : (24 - hrs) / 12;
    ringFill.style.strokeDasharray = (ringRatio * RING_C).toFixed(2) + " " + RING_C.toFixed(2);
    // 下午段用負 dashoffset 讓弧的起點順時針前進、終點固定在頂部，消去時同樣順時針
    ringFill.style.strokeDashoffset = hrs < 12 ? "0" : (-(1 - ringRatio) * RING_C).toFixed(2);
    setText("ringTitle", "今日進度 " + (hrs / 24 * 100).toFixed(0) + "%");

    // 本週進度（週日起、週六止）
    var weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day);
    var weekRatio = (now - weekStart) / 604800000;
    weekFill.style.strokeDasharray = (weekRatio * RING_C).toFixed(2) + " " + RING_C.toFixed(2);
    setText("weekTitle", "本週進度 " + (weekRatio * 100).toFixed(1) + "%");

    // 今年進度（分段）
    var yearStart = new Date(now.getFullYear(), 0, 1);
    var yearEnd = new Date(now.getFullYear() + 1, 0, 1);
    var yearRatio = (now - yearStart) / (yearEnd - yearStart);
    var yearPct = yearRatio * 100;
    setText("yearpct", yearPct.toFixed(1) + "%");
    segContainer.setAttribute("aria-valuenow", yearPct.toFixed(1));

    var month = now.getMonth();
    for (var i = 0; i < SEG_COUNT; i++) {
      var f;
      if (i < month) {
        f = 1;
      } else if (i > month) {
        f = 0;
      } else {
        var mStart = new Date(now.getFullYear(), i, 1);
        var mEnd = new Date(now.getFullYear(), i + 1, 1);
        f = (now - mStart) / (mEnd - mStart);
      }
      fills[i].style.width = (f * 100).toFixed(1) + "%";
    }
  }

  // ---- 主題切換 ----
  var dots = document.querySelectorAll(".dot");
  function applyTheme(t, save) {
    if (THEMES.indexOf(t) < 0) t = "blue";
    document.documentElement.setAttribute("data-theme", t);
    for (var i = 0; i < dots.length; i++) {
      var on = dots[i].getAttribute("data-theme") === t;
      dots[i].classList.toggle("active", on);
      dots[i].setAttribute("aria-pressed", on ? "true" : "false");
    }
    if (save) {
      try { localStorage.setItem("dash-theme", t); } catch (e) {}
    }
    styles = getComputedStyle(document.documentElement);
    buildSegments();
    tick();
  }
  for (var i = 0; i < dots.length; i++) {
    dots[i].addEventListener("click", function () {
      applyTheme(this.getAttribute("data-theme"), true);
    });
  }

  if (window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
      styles = getComputedStyle(document.documentElement);
      buildSegments();
      tick();
    });
  }

  // 初始主題：網址 hash > 上次選擇 > 淡藍
  var initTheme = (location.hash || "").replace("#", "");
  if (THEMES.indexOf(initTheme) < 0) {
    try { initTheme = localStorage.getItem("dash-theme") || "blue"; } catch (e) { initTheme = "blue"; }
  }
  applyTheme(initTheme, false);

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      document.body.classList.add("ready");
    });
  });
  setInterval(tick, 1000);

  // ---- 台中即時天氣（Open-Meteo，每 30 分鐘更新） ----
  var WX_LAT = 24.0994, WX_LON = 120.6781;
  // 環境部開放平臺 API 金鑰（https://data.moenv.gov.tw 免費註冊後填入引號中）；
  // 留空時改用 Open-Meteo 衛星模型估計值
  var MOENV_API_KEY = "";
  var MOENV_SITE = "大里"; // 就近測站（臺中市大里區）
  var WX_ICONS = {
    0: "\u2600\uFE0F", 1: "\uD83C\uDF24\uFE0F", 2: "\u26C5", 3: "\u2601\uFE0F",
    45: "\uD83C\uDF2B\uFE0F", 48: "\uD83C\uDF2B\uFE0F",
    51: "\uD83C\uDF26\uFE0F", 53: "\uD83C\uDF26\uFE0F", 55: "\uD83C\uDF27\uFE0F",
    56: "\uD83C\uDF27\uFE0F", 57: "\uD83C\uDF27\uFE0F",
    61: "\uD83C\uDF27\uFE0F", 63: "\uD83C\uDF27\uFE0F", 65: "\uD83C\uDF27\uFE0F",
    66: "\uD83C\uDF27\uFE0F", 67: "\uD83C\uDF27\uFE0F",
    71: "\uD83C\uDF28\uFE0F", 73: "\uD83C\uDF28\uFE0F", 75: "\u2744\uFE0F", 77: "\uD83C\uDF28\uFE0F",
    80: "\uD83C\uDF26\uFE0F", 81: "\uD83C\uDF27\uFE0F", 82: "\u26C8\uFE0F",
    85: "\uD83C\uDF28\uFE0F", 86: "\u2744\uFE0F",
    95: "\u26C8\uFE0F", 96: "\u26C8\uFE0F", 99: "\u26C8\uFE0F"
  };
  var WX_DESC = {
    0: "晴朗", 1: "大致晴朗", 2: "多雲時晴", 3: "陰",
    45: "霧", 48: "霧淞", 51: "毛毛雨", 53: "毛毛雨", 55: "毛毛雨",
    56: "凍雨", 57: "凍雨", 61: "小雨", 63: "中雨", 65: "大雨",
    66: "凍雨", 67: "凍雨", 71: "小雪", 73: "中雪", 75: "大雪", 77: "霰",
    80: "零星陣雨", 81: "陣雨", 82: "強陣雨", 85: "陣雪", 86: "強陣雪",
    95: "雷陣雨", 96: "雷雨夾冰雹", 99: "大雷雨"
  };
  function aqiInfo(v) {
    if (v <= 50) return ["#46A171", "良好"];
    if (v <= 100) return ["#EAC26B", "普通"];
    if (v <= 150) return ["#D5803B", "對敏感族群不健康"];
    if (v <= 200) return ["#E56458", "對所有族群不健康"];
    return ["#8E44AD", "非常不健康"];
  }
  function loadWeather() {
    var wxUrl = "https://api.open-meteo.com/v1/forecast?latitude=" + WX_LAT + "&longitude=" + WX_LON +
      "&current=temperature_2m,apparent_temperature,relative_humidity_2m,precipitation,weather_code&hourly=precipitation_probability&forecast_days=1&timezone=Asia%2FTaipei";
    // 空品：優先環境部官方測站資料，失敗或未設金鑰時退回 Open-Meteo 估計
    var aqPromise = (MOENV_API_KEY
      ? fetch("https://data.moenv.gov.tw/api/v2/aqx_p_432?language=zh&api_key=" + b3dbbfb7-fbaf-46fb-b3c8-fd67b6ae707a + "&limit=250")
          .then(function (r) { return r.json(); })
          .then(function (j) {
            var recs = (j && j.records) || [];
            for (var i = 0; i < recs.length; i++) {
              if (recs[i].sitename === MOENV_SITE) {
                return {
                  aqi: Math.round(parseFloat(recs[i].aqi)),
                  status: recs[i].status || null,
                  src: MOENV_SITE + "測站（環境部）"
                };
              }
            }
            throw new Error("site not found");
          })
      : Promise.reject(new Error("no key")))
      .catch(function () {
        return fetch("https://air-quality-api.open-meteo.com/v1/air-quality?latitude=" + WX_LAT + "&longitude=" + WX_LON + "&current=us_aqi&timezone=Asia%2FTaipei")
          .then(function (r) { return r.json(); })
          .then(function (j) {
            return { aqi: Math.round(j.current.us_aqi), status: null, src: "模型估計" };
          });
      })
      .catch(function () { return null; });

    Promise.all([
      fetch(wxUrl).then(function (r) { return r.json(); }),
      aqPromise
    ]).then(function (res) {
      var wx = res[0], aq = res[1];
      var cur = wx.current;
      var code = cur.weather_code;
      var temp = Math.round(cur.temperature_2m);
      var hourIdx = new Date().getHours();
      var rain = (wx.hourly && wx.hourly.precipitation_probability && wx.hourly.precipitation_probability[hourIdx] != null)
        ? wx.hourly.precipitation_probability[hourIdx] : null;
      setText("wxIcon", WX_ICONS[code] || "\uD83C\uDF21\uFE0F");
      setText("wxTemp", temp + "\u00B0");
      setText("wxRain", rain != null ? rain + "%" : "--%");
      var label = "台中 " + (WX_DESC[code] || "") + " " + temp + "\u00B0C（體感 " + Math.round(cur.apparent_temperature) + "\u00B0C）";
      if (cur.relative_humidity_2m != null) label += "｜濕度 " + cur.relative_humidity_2m + "%";
      label += "｜降雨機率 " + (rain != null ? rain + "%" : "未知");
      if (cur.precipitation != null) label += "，時雨量 " + cur.precipitation + " mm";
      if (aq && aq.aqi != null && isFinite(aq.aqi)) {
        var info = aqiInfo(aq.aqi);
        setText("wxAqi", aq.aqi);
        document.getElementById("wxAqiDot").style.background = info[0];
        label += "｜AQI " + aq.aqi + "（" + (aq.status || info[1]) + "，" + aq.src + "）";
      } else {
        setText("wxAqi", "--");
      }
      var chip = document.getElementById("wx");
      chip.setAttribute("aria-label", label);
      chip.title = label;
      chip.hidden = false;
    }).catch(function () { /* 連線失敗時保持隱藏，不影響儀表板 */ });
  }

  // ---- 台股加權指數（盤中延遲報價，失敗時退回證交所 OpenAPI 收盤資料） ----
  function fmtIdx(n) {
    return n.toLocaleString("zh-Hant-TW", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function renderStock(val, chg, pct, note) {
    setText("twVal", fmtIdx(val));
    var el = document.getElementById("twChg");
    var arrow = chg > 0 ? "\u25B2" : chg < 0 ? "\u25BC" : "\u2013";
    el.textContent = arrow + Math.abs(chg).toFixed(2) + " " + (chg > 0 ? "+" : chg < 0 ? "-" : "") + Math.abs(pct).toFixed(2) + "%";
    el.className = "wx-item " + (chg > 0 ? "wx-up" : chg < 0 ? "wx-down" : "wx-flat");
    var chip = document.getElementById("tw");
    var label = "台股加權指數 " + fmtIdx(val) + "，漲跌 " + (chg >= 0 ? "+" : "") + chg.toFixed(2) + "（" + (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%）" + (note ? "｜" + note : "");
    chip.title = label;
    chip.setAttribute("aria-label", label);
    chip.hidden = false;
  }
  function loadStock() {
    fetch("https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_t00.tw&json=1&delay=0")
      .then(function (r) { return r.json(); })
      .then(function (j) {
        var m = j.msgArray && j.msgArray[0];
        var z = parseFloat(m && m.z), y = parseFloat(m && m.y);
        if (!isFinite(z) || !isFinite(y) || y === 0) throw new Error("no data");
        renderStock(z, z - y, (z - y) / y * 100, "盤中延遲報價" + (m.t ? " " + m.t : ""));
      })
      .catch(function () {
        return fetch("https://openapi.twse.com.tw/v1/exchangeReport/MI_INDEX")
          .then(function (r) { return r.json(); })
          .then(function (rows) {
            var row = null;
            for (var i = 0; i < rows.length; i++) {
              if (rows[i]["指數"] === "發行量加權股價指數") { row = rows[i]; break; }
            }
            if (!row) return;
            var val = parseFloat(String(row["收盤指數"]).replace(/,/g, ""));
            var sign = String(row["漲跌"]).indexOf("-") >= 0 ? -1 : 1;
            var chg = sign * Math.abs(parseFloat(String(row["漲跌點數"]).replace(/,/g, "")));
            var pct = sign * Math.abs(parseFloat(String(row["漲跌百分比"]).replace(/,/g, "")));
            if (!isFinite(val) || !isFinite(chg) || !isFinite(pct)) return;
            renderStock(val, chg, pct, "當日收盤資料");
          })
          .catch(function () { /* 保持隱藏 */ });
      });
  }
  loadWeather();
  loadStock();
  setInterval(loadWeather, 30 * 60 * 1000);
  setInterval(loadStock, 10 * 60 * 1000);
})();
</script>
</body>
</html>
