<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日儀表板</title>
<style>
  :root {
    --text: #2C2C2B;
    --text2: #7D7A75;
    --seg-empty: #F0EFED;
    --dot-ring: rgba(0,0,0,0.18);
    --sun-day: #F0CE9A;
    --sun-night: #B9C6DF;
    --sun-hand: #DF5B4E;
    --dot-blue: #A9CDEC;
    --dot-green: #A8D3B8;
    --dot-amber: #E9CF95;
    --dot-lav: #C9B8E4;
    --dot-rose: #E9BCC8;
    --dot-teal: #A8D3D1;
    --seg-fill-a: #BFD9F2;
    --seg-fill-b: #8FBBE8;
    --chip-bg: #EAF3FB;
    --chip-text: #5B8FC7;
    /* 星期燈：平日柿橘、週末灰玫瑰，亮燈皆實心白字、同尺寸 */
    --wd-on: #E8683C;
    --wd-on-wknd: #D37790;
    --wd-off-bg: #FCEFE5;
    --wd-off-text: #C68C66;
    --wd-off-bg-wknd: #FAEFF2;
    --wd-off-text-wknd: #D194A3;
    /* 年度天數標籤：扁平內斂 */
    --doy-text: #8C8983;
    /* 分區細線 */
    --divider: rgba(0,0,0,0.12);
  }
  :root[data-theme="green"] {
    --seg-fill-a: #C2E0CE;
    --seg-fill-b: #85C29F;
    --chip-bg: #E9F4EE;
    --chip-text: #4F9C74;
  }
  :root[data-theme="amber"] {
    --seg-fill-a: #F0DFB6;
    --seg-fill-b: #DFBE72;
    --chip-bg: #FAF2DF;
    --chip-text: #A98938;
  }
  :root[data-theme="lav"] {
    --seg-fill-a: #DCD2EE;
    --seg-fill-b: #B29BDC;
    --chip-bg: #F2EEFA;
    --chip-text: #8A6FC0;
  }
  :root[data-theme="rose"] {
    --seg-fill-a: #F1D3DB;
    --seg-fill-b: #DFA0B2;
    --chip-bg: #FAEFF2;
    --chip-text: #BC7089;
  }
  :root[data-theme="teal"] {
    --seg-fill-a: #C5E3E1;
    --seg-fill-b: #82C6C3;
    --chip-bg: #E9F5F4;
    --chip-text: #4E9C99;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #FFFFFF;
      --text2: rgba(255,255,255,0.65);
      --seg-empty: rgba(255,255,255,0.13);
      --dot-ring: rgba(255,255,255,0.35);
      --sun-day: rgba(240,200,130,0.72);
      --sun-night: rgba(150,170,210,0.55);
      --sun-hand: #E97B6F;
      --seg-fill-a: rgba(94,159,232,0.45);
      --seg-fill-b: rgba(94,159,232,0.85);
      --chip-bg: rgba(94,159,232,0.14);
      --chip-text: #8FB8E8;
      --wd-on: #E97C4E;
      --wd-on-wknd: #D17B92;
      --wd-off-bg: rgba(233,124,78,0.14);
      --wd-off-text: rgba(238,158,120,0.78);
      --wd-off-bg-wknd: rgba(228,150,173,0.14);
      --wd-off-text-wknd: rgba(238,175,193,0.8);
      --doy-text: rgba(255,255,255,0.62);
      --divider: rgba(255,255,255,0.18);
    }
    :root[data-theme="green"] {
      --seg-fill-a: rgba(114,188,143,0.45);
      --seg-fill-b: rgba(114,188,143,0.85);
      --chip-bg: rgba(114,188,143,0.14);
      --chip-text: #93CDA9;
    }
    :root[data-theme="amber"] {
      --seg-fill-a: rgba(224,190,114,0.45);
      --seg-fill-b: rgba(224,190,114,0.85);
      --chip-bg: rgba(224,190,114,0.14);
      --chip-text: #DCC183;
    }
    :root[data-theme="lav"] {
      --seg-fill-a: rgba(178,155,220,0.45);
      --seg-fill-b: rgba(178,155,220,0.85);
      --chip-bg: rgba(178,155,220,0.14);
      --chip-text: #C3B0E4;
    }
    :root[data-theme="rose"] {
      --seg-fill-a: rgba(223,160,178,0.45);
      --seg-fill-b: rgba(223,160,178,0.85);
      --chip-bg: rgba(223,160,178,0.14);
      --chip-text: #E4B3C1;
    }
    :root[data-theme="teal"] {
      --seg-fill-a: rgba(130,198,195,0.45);
      --seg-fill-b: rgba(130,198,195,0.85);
      --chip-bg: rgba(130,198,195,0.14);
      --chip-text: #9AD0CD;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: transparent; }
  body {
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px 24px;
  }
  .wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .main {
    flex: 1 1 auto;
    min-width: 0;
  }
  /* ---- top line: date + day ring + time ---- */
  .line {
    display: flex;
    align-items: baseline;
    gap: 9px;
    flex-wrap: wrap;
  }
  .date {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  /* 星期標籤：與「第 N 天」同家族，平日柿橘、週末灰玫瑰 */
  .wd-chip {
    background: var(--wd-off-bg);
    color: var(--wd-on);
    border-radius: 4px;
    padding: 0 5px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
  }
  .wd-chip.wknd {
    background: var(--wd-off-bg-wknd);
    color: var(--wd-on-wknd);
  }
  body.ready .wd-chip { transition: background 0.3s ease, color 0.3s ease; }
  /* ---- 分區細線：時間與週曆之間 ---- */
  .vdiv {
    flex: 0 0 auto;
    align-self: center;
    width: 1px;
    height: 30px;
    border-radius: 0.5px;
    background: var(--divider);
  }
  /* ---- 迷你雙週曆（時間與主題色點之間） ---- */
  .weekcal {
    flex: 0 0 auto;
    align-self: center;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .wc-row {
    display: grid;
    grid-template-columns: repeat(7, 18px);
    gap: 2px;
    justify-items: center;
    align-items: center;
  }
  .wc-head span {
    font-size: 9px;
    font-weight: 600;
    line-height: 1;
    color: var(--text2);
    user-select: none;
  }
  .wc-head span.wknd { color: var(--wd-off-text-wknd); }
  .wc-days span {
    width: 18px;
    height: 15px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--text2);
    user-select: none;
  }
  .wc-days { row-gap: 4px; }
  .wc-days span.wknd { color: var(--wd-off-text-wknd); }
  .wc-days span.today { background: var(--wd-on); color: #FFFFFF; }
  .wc-days span.today.wknd { background: var(--wd-on-wknd); }
  .doy-chip.term { background: #F7E7CB; color: #A9702B; }
  .doy-chip {
    background: var(--seg-empty);
    color: var(--doy-text);
    border-radius: 4px;
    padding: 0 5px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
  }
  /* ---- 天氣膠囊：與「第 N 天」同家族 ---- */
  .wx-chip {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: var(--chip-bg);
    border-radius: 4px;
    padding: 0 6px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .wx-chip[hidden] { display: none; }
  .wx-ic {
    font-size: 11px;
    line-height: 15px;
  }
  .wx-t { font-weight: 600; }
  .wx-item {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .wx-up { color: #C1867D; font-weight: 600; }
  .wx-down { color: #7FA98E; font-weight: 600; }
  .wx-flat { color: var(--text2); font-weight: 600; }
  .wx-lab { color: var(--text2); font-weight: 500; }
  #wx { cursor: pointer; }
  .moon-ic { font-size: 12px; line-height: 15px; align-self: center; user-select: none; }
  #tw.mkt-closed { background: #EDEDEB; }
  #tw.mkt-open-up { background: #F6E8E4; }
  #tw.mkt-open-down { background: #E7F0EA; }
  .wx-aqi-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #9AA0A6;
    flex: 0 0 auto;
  }
  .time-group {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    align-self: center;
  }
  .dayring {
    display: block;
    transform: rotate(-90deg);
  }
  .ring-base {
    fill: var(--chip-bg);
  }
  .ring-fill {
    fill: none;
    stroke: var(--seg-fill-b);
    stroke-width: 9;
  }
  body.ready .ring-fill { transition: stroke-dasharray 0.8s ease; }
  /* 日照時鐘：自訂角度（正午在上、午夜在下），不套用 -90deg 旋轉 */
  #sunring { transform: none; }
  #sunDayArc { fill: none; stroke: var(--sun-day); stroke-width: 4.4; }
  #sunNightArc { fill: none; stroke: var(--sun-night); stroke-width: 4.4; }
  #sunHand { fill: var(--sun-hand); stroke: var(--chip-bg); stroke-width: 0.9; }
  .time {
    font-size: 21px;
    font-weight: 650;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .time .sec {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
  }
  /* ---- segmented year progress ---- */
  .bar-row {
    margin-top: 9px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .bar-label {
    flex: 0 0 auto;
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }
  .segments {
    flex: 1 1 auto;
    display: flex;
    gap: 3px;
    height: 6px;
  }
  .seg {
    flex: 1 1 0;
    background: var(--seg-empty);
    border-radius: 3px;
    overflow: hidden;
  }
  .seg-inner {
    display: block;
    height: 100%;
    width: 0%;
    border-radius: inherit;
  }
  body.ready .seg-inner { transition: width 0.8s ease; }
  .bar-pct {
    flex: 0 0 auto;
    font-size: 11px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    text-align: right;
    white-space: nowrap;
  }
  /* ---- theme dots (right edge) ---- */
  .dots {
    flex: 0 0 auto;
    display: grid;
    grid-template-rows: repeat(3, auto);
    grid-auto-flow: column;
    gap: 3px;
  }
  .dot {
    width: 11px;
    height: 11px;
    border: none;
    background: transparent;
    padding: 0;
    position: relative;
    cursor: pointer;
  }
  .dot::before {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--c);
    opacity: 0.8;
    transition: opacity 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .dot:hover::before { opacity: 1; transform: scale(1.12); }
  .dot.active::before {
    opacity: 1;
    box-shadow: 0 0 0 2px var(--dot-ring);
  }
  .dot:focus-visible { outline: none; }
  .dot:focus-visible::before { box-shadow: 0 0 0 2px var(--dot-ring), 0 0 0 4px var(--chip-bg); }
  .dot-blue  { --c: var(--dot-blue); }
  .dot-green { --c: var(--dot-green); }
  .dot-amber { --c: var(--dot-amber); }
  .dot-lav   { --c: var(--dot-lav); }
  .dot-rose  { --c: var(--dot-rose); }
  .dot-teal  { --c: var(--dot-teal); }
  @media (max-width: 480px) {
    body { padding: 8px 16px; }
    .time { font-size: 19px; }
    .segments { gap: 2px; }
    .doy-chip { display: none; }
    .wx-chip .wx-lab { display: none; }
    .weekcal, .vdiv { display: none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="main">
      <div class="line">
        <span class="date" id="date">—</span>
        <span class="wd-chip" id="wdchip" role="img" aria-label="星期">—</span>
        <span class="moon-ic" id="moon" role="img" aria-label="月相" hidden>—</span>
        <span class="wx-chip" id="wx" hidden role="img" aria-label="台中即時天氣" title="點一下切換 大里／南屯">
          <span class="wx-item"><span class="wx-lab" id="wxLoc">—</span></span>
          <span class="wx-item"><span class="wx-ic" id="wxIcon">—</span><span class="wx-t" id="wxTemp">--°</span></span>
          <span class="wx-item"><span class="wx-lab">☔</span><span id="wxRain">--%</span></span>
          <span class="wx-item"><span class="wx-aqi-dot" id="wxAqiDot" aria-hidden="true"></span><span id="wxAqi">--</span></span>
        </span>
        <span class="wx-chip" id="tw" hidden role="img" aria-label="台股加權指數">
          <span class="wx-item"><span class="wx-lab">^TWII</span><span class="wx-t" id="twVal">--</span></span>
          <span class="wx-item wx-flat" id="twChg">--</span>
        </span>
        <span class="time-group">
          <svg class="dayring" id="weekring" viewBox="0 0 20 20" width="19" height="19" role="img" aria-label="本週進度">
            <title id="weekTitle">本週進度</title>
            <circle class="ring-base" cx="10" cy="10" r="9"></circle>
            <circle class="ring-fill week" id="weekFill" cx="10" cy="10" r="4.5"></circle>
          </svg>
          <svg class="dayring" id="sunring" viewBox="0 0 20 20" width="19" height="19" role="img" aria-label="日照時鐘">
            <title id="sunTitle">日照時鐘</title>
            <circle class="ring-base" cx="10" cy="10" r="9"></circle>
            <path id="sunDayArc" d=""></path>
            <path id="sunNightArc" d=""></path>
            <circle id="sunHand" cx="10" cy="3.5" r="1.9"></circle>
          </svg>
          <svg class="dayring" id="dayring" viewBox="0 0 20 20" width="19" height="19" role="img" aria-label="今日進度">
            <title id="ringTitle">今日進度</title>
            <circle class="ring-base" cx="10" cy="10" r="9"></circle>
            <circle class="ring-fill" id="ringFill" cx="10" cy="10" r="4.5"></circle>
          </svg>
          <span class="time"><span id="hm">--:--</span> <span class="sec" id="ss">--</span></span>
        </span>
      </div>
      <div class="bar-row">
        <span class="bar-label">今年</span>
        <span class="segments" id="segments" role="progressbar" aria-label="今年進度" aria-valuemin="0" aria-valuemax="100"></span>
        <span class="bar-pct" id="yearpct">--%</span>
        <span class="doy-chip" id="yearline">—</span>
        <span class="doy-chip" id="lunar" hidden>—</span>
      </div>
    </div>
    <div class="vdiv" aria-hidden="true"></div>
    <div class="weekcal" id="weekcal" role="img" aria-label="雙週日曆">
      <div class="wc-row wc-head" aria-hidden="true">
        <span class="wknd">日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span class="wknd">六</span>
      </div>
      <div class="wc-row wc-days" id="wcdays"></div>
    </div>
    <div class="dots" role="group" aria-label="主題顏色">
      <button type="button" class="dot dot-blue" data-theme="blue" aria-label="淡藍主題"></button>
      <button type="button" class="dot dot-green" data-theme="green" aria-label="淡綠主題"></button>
      <button type="button" class="dot dot-amber" data-theme="amber" aria-label="淡黃主題"></button>
      <button type="button" class="dot dot-lav" data-theme="lav" aria-label="淡紫主題"></button>
      <button type="button" class="dot dot-rose" data-theme="rose" aria-label="淡粉主題"></button>
      <button type="button" class="dot dot-teal" data-theme="teal" aria-label="淡青主題"></button>
    </div>
  </div>

<script>
(function () {
  "use strict";
  var WEEKDAYS = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
  var SEG_COUNT = 12; /* 12 個月，上色處即當月進度 */
  var THEMES = ["blue", "green", "amber", "lav", "rose", "teal"];
  var RING_C = 2 * Math.PI * 4.5;
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function setText(id, v) { document.getElementById(id).textContent = v; }

  var segContainer = document.getElementById("segments");
  var ringFill = document.getElementById("ringFill");
  var weekFill = document.getElementById("weekFill");

  // ---- 日照時鐘：台中日出日落（NOAA 簡化公式，本地計算免 API） ----
  var SUN_LAT = 24.135, SUN_LON = 120.68, SUN_R = 6.8;
  var sunKey = "", sunRise = 5.5, sunSet = 18.5;
  function computeSunTimes(d) {
    var rad = Math.PI / 180;
    var N = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
    var lngHour = SUN_LON / 15;
    function calc(rising) {
      var t = N + ((rising ? 6 : 18) - lngHour) / 24;
      var M = 0.9856 * t - 3.289;
      var L = M + 1.916 * Math.sin(M * rad) + 0.02 * Math.sin(2 * M * rad) + 282.634;
      L = (L % 360 + 360) % 360;
      var RA = Math.atan(0.91764 * Math.tan(L * rad)) / rad;
      RA = (RA % 360 + 360) % 360;
      RA = (RA + Math.floor(L / 90) * 90 - Math.floor(RA / 90) * 90) / 15;
      var sinDec = 0.39782 * Math.sin(L * rad);
      var cosDec = Math.cos(Math.asin(sinDec));
      var cosH = (Math.cos(90.833 * rad) - sinDec * Math.sin(SUN_LAT * rad)) / (cosDec * Math.cos(SUN_LAT * rad));
      if (cosH > 1) return rising ? 6 : 18;
      if (cosH < -1) return rising ? 0 : 24;
      var H = (rising ? 360 - Math.acos(cosH) / rad : Math.acos(cosH) / rad) / 15;
      var T = H + RA - 0.06571 * t - 6.622;
      return ((T - lngHour + 8) % 24 + 24) % 24; // 台灣 UTC+8
    }
    return [calc(true), calc(false)];
  }
  // 將時刻映射到圓上：正午在頂、午夜在底，順時針
  function sunPt(t, r) {
    var a = ((t - 12) / 24) * 2 * Math.PI;
    return [(10 + r * Math.sin(a)).toFixed(2), (10 - r * Math.cos(a)).toFixed(2)];
  }
  function sunArc(t1, t2) {
    var p1 = sunPt(t1, SUN_R), p2 = sunPt(t2, SUN_R);
    var span = ((t2 - t1) % 24 + 24) % 24 / 24 * 360;
    return "M " + p1[0] + " " + p1[1] + " A " + SUN_R + " " + SUN_R + " 0 " + (span > 180 ? 1 : 0) + " 1 " + p2[0] + " " + p2[1];
  }
  function fmtHM(h) {
    var hh = Math.floor(h), mm = Math.round((h - hh) * 60);
    if (mm === 60) { hh = (hh + 1) % 24; mm = 0; }
    return pad(hh) + ":" + pad(mm);
  }
  function updateSunRing(now) {
    var key = now.getFullYear() + "-" + now.getMonth() + "-" + now.getDate();
    if (key !== sunKey) {
      sunKey = key;
      var st = computeSunTimes(now);
      sunRise = st[0]; sunSet = st[1];
      document.getElementById("sunDayArc").setAttribute("d", sunArc(sunRise, sunSet));
      document.getElementById("sunNightArc").setAttribute("d", sunArc(sunSet, sunRise));
      setText("sunTitle", "日出 " + fmtHM(sunRise) + "｜日落 " + fmtHM(sunSet));
    }
    var hp = sunPt(now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600, SUN_R);
    var hand = document.getElementById("sunHand");
    hand.setAttribute("cx", hp[0]);
    hand.setAttribute("cy", hp[1]);
  }
  var wdChip = document.getElementById("wdchip");
  var wcDays = document.getElementById("wcdays");
  var weekcal = document.getElementById("weekcal");
  var lastDateKey = "";
  var fills = [];
  var styles = getComputedStyle(document.documentElement);

  function parseColor(v) {
    var s = v.trim();
    if (s.charAt(0) === "#") {
      return [parseInt(s.substr(1, 2), 16), parseInt(s.substr(3, 2), 16), parseInt(s.substr(5, 2), 16), 1];
    }
    var m = s.match(/rgba?\(([^)]+)\)/);
    if (m) {
      var p = m[1].split(",").map(parseFloat);
      return [p[0], p[1], p[2], p.length > 3 ? p[3] : 1];
    }
    return [143, 187, 232, 1];
  }
  function mix(a, b, t) {
    var r = [];

      temp = temp != null ? Math.round(temp) : null;
      setText("wxLoc", L.name);
      setText("wxIcon", pick("icon") || "\uD83C\uDF21\uFE0F");
      setText("wxTemp", (temp != null ? temp : "--") + "\u00B0");
      var rain = pick("rain");
      setText("wxRain", rain != null ? Math.round(rain) + "%" : "--%");
      var parts = [];
      var desc = pick("desc"), feels = pick("feels");
      parts.push((desc ? desc + " " : "") + (temp != null ? temp : "--") + "\u00B0C" + (feels != null ? "（體感 " + Math.round(feels) + "\u00B0C）" : ""));
      if (pick("hum") != null) parts.push("濕度 " + Math.round(pick("hum")) + "%");
      parts.push("降雨機率 " + (rain != null ? Math.round(rain) + "%" : "未知"));
      if (pick("pressure") != null) parts.push("氣壓 " + Math.round(pick("pressure")) + " hPa");
      if (pick("wind")) parts.push("風 " + pick("wind") + (pick("windSpd") != null ? " " + pick("windSpd") + " m/s" : ""));
      var uv = uvText(pick("uv"));
      if (uv) parts.push("紫外線 " + uv);
      if (aq && aq.aqi != null && isFinite(aq.aqi)) {
        var info = aqiInfo(aq.aqi);
        setText("wxAqi", aq.aqi);
        document.getElementById("wxAqiDot").style.background = info[0];
        parts.push("AQI " + aq.aqi + "（" + (aq.status || info[1]) + "）");
      } else {
        setText("wxAqi", "--");
      }
      var srcs = [];
      if (cwa) srcs.push("氣象署");
      if (aq && aq.src === "環境部") srcs.push("環境部");
      if (om && (!cwa || pick("pressure") != null || pick("uv") != null || (aq && aq.src === "Open-Meteo"))) srcs.push("Open-Meteo");
      parts.push(L.name + "｜資訊：" + srcs.join("、"));
      var upd = new Date();
      parts.push("更新 " + pad(upd.getHours()) + ":" + pad(upd.getMinutes()));
      var label = parts.join("｜");
      var chip = document.getElementById("wx");
      chip.title = label + "\n（點一下切換 大里／南屯）";
      chip.setAttribute("aria-label", label);
      chip.hidden = false;
    }).catch(function () { /* 連線失敗時保持隱藏，不影響儀表板 */ });
  }
  // 點一下天氣膠囊切換大里／南屯（手動選擇後，本次開啟期間不再自動改回預設）
  document.getElementById("wx").addEventListener("click", function () {
    wxManualLoc = true;
    wxLocKey = wxLocKey === "dali" ? "nantun" : "dali";
    loadWeather();
  });

  // ---- 台股加權指數（盤中延遲報價，失敗時退回證交所 OpenAPI 收盤資料） ----
  function fmtIdx(n) {
    return n.toLocaleString("zh-Hant-TW", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtK(n) {
    return (n / 1000).toFixed(1) + "K";
  }
  function twMarketOpen() {
    var d = new Date(), w = d.getDay();
    if (w === 0 || w === 6) return false;
    var m = d.getHours() * 60 + d.getMinutes();
    return m >= 540 && m <= 810; // 09:00–13:30
  }
  var globalNote = "";
  var twTitleBase = "";
  function applyTwTitle() {
    var chip = document.getElementById("tw");
    chip.title = twTitleBase + (globalNote ? "\n" + globalNote : "");
    chip.setAttribute("aria-label", twTitleBase);
  }
  function renderStock(val, chg, pct, note) {
    setText("twVal", fmtK(val));
    var el = document.getElementById("twChg");
    var arrow = chg > 0 ? "\u25B2" : chg < 0 ? "\u25BC" : "\u2013";
    el.textContent = arrow + fmtK(Math.abs(chg)) + " " + (chg > 0 ? "+" : chg < 0 ? "-" : "") + Math.abs(pct).toFixed(2) + "%";
    el.className = "wx-item " + (chg > 0 ? "wx-up" : chg < 0 ? "wx-down" : "wx-flat");
    var chip = document.getElementById("tw");
    // 盤中依漲跌上色，收盤後一律灰底
    chip.classList.remove("mkt-open-up", "mkt-open-down", "mkt-closed");
    if (twMarketOpen()) {
      if (chg > 0) chip.classList.add("mkt-open-up");
      else if (chg < 0) chip.classList.add("mkt-open-down");
    } else {
      chip.classList.add("mkt-closed");
    }
    twTitleBase = "台股加權指數 " + fmtIdx(val) + "，漲跌 " + (chg >= 0 ? "+" : "") + chg.toFixed(2) + "（" + (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%）" + (twMarketOpen() ? "｜盤中" : "｜已收盤") + (note ? "｜" + note : "");
    applyTwTitle();
    chip.hidden = false;
  }
  function loadStock() {
    // 首選：富果即時行情（金鑰由 Worker 專線自動附加；未設金鑰或失敗時自動退回證交所）
    fetchJson("https://api.fugle.tw/marketdata/v1.0/stock/intraday/quote/IX0001")
      .then(function (j) {
        var y = parseFloat(j && j.previousClose);
        var z = parseFloat(j && (j.closePrice != null ? j.closePrice : j.lastPrice));
        if (!isFinite(z) || !isFinite(y) || y === 0) throw new Error("no data");
        var chg = isFinite(parseFloat(j.change)) ? parseFloat(j.change) : z - y;
        var pct = isFinite(parseFloat(j.changePercent)) ? parseFloat(j.changePercent) : chg / y * 100;
        renderStock(z, chg, pct, "富果即時行情");
      })
      .catch(loadStockTwse);
  }
  function loadStockTwse() {
    fetchJson("https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=tse_t00.tw&json=1&delay=0")
      .then(function (j) {
        var m = j.msgArray && j.msgArray[0];
        var z = parseFloat(m && m.z), y = parseFloat(m && m.y);
        if (!isFinite(z) || !isFinite(y) || y === 0) throw new Error("no data");
        renderStock(z, z - y, (z - y) / y * 100, "盤中延遲報價" + (m.t ? " " + m.t : ""));
      })
      .catch(function () {
        return fetchJson("https://openapi.twse.com.tw/v1/exchangeReport/MI_INDEX")
          .then(function (rows) {
            var row = null;
            for (var i = 0; i < rows.length; i++) {
              if (rows[i]["指數"] === "發行量加權股價指數") { row = rows[i]; break; }
            }
            if (!row) return;
            var val = parseFloat(String(row["收盤指數"]).replace(/,/g, ""));
            var sign = String(row["漲跌"]).indexOf("-") >= 0 ? -1 : 1;
            var chg = sign * Math.abs(parseFloat(String(row["漲跌點數"]).replace(/,/g, "")));
            var pct = sign * Math.abs(parseFloat(String(row["漲跌百分比"]).replace(/,/g, "")));
            if (!isFinite(val) || !isFinite(chg) || !isFinite(pct)) return;
            renderStock(val, chg, pct, "當日收盤資料");
          })
          .catch(function () { /* 保持隱藏 */ });
      });
  }
  // ---- 全球市場（納指、費半、標普、道瓊、金價、油價；Yahoo Finance 最新收盤，顯示於台股懸浮資訊） ----
  var GLOBAL_SYMS = [["^IXIC", "納指"], ["^SOX", "費半"], ["^GSPC", "標普"], ["^DJI", "道瓊"], ["GC=F", "金價"], ["CL=F", "油價"]];
  function loadGlobal() {
    Promise.all(GLOBAL_SYMS.map(function (s) {
      return fetchJson("https://query1.finance.yahoo.com/v8/finance/chart/" + encodeURIComponent(s[0]) + "?range=1d&interval=1d")
        .then(function (j) {
          var meta = j && j.chart && j.chart.result && j.chart.result[0] && j.chart.result[0].meta;
          var p = meta ? parseFloat(meta.regularMarketPrice) : NaN;
          var prev = meta ? parseFloat(meta.chartPreviousClose) : NaN;
          if (!isFinite(p)) return null;
          var txt = s[1] + " " + p.toLocaleString("zh-Hant-TW", { maximumFractionDigits: p >= 1000 ? 0 : 2 });
          if (isFinite(prev) && prev !== 0) {
            var pc = (p - prev) / prev * 100;
            txt += "（" + (pc >= 0 ? "+" : "") + pc.toFixed(2) + "%）";
          }
          return txt;
        })
        .catch(function () { return null; });
    })).then(function (arr) {
      var ok = arr.filter(function (x) { return x; });
      globalNote = ok.length ? "全球收盤：" + ok.join("｜") : "";
      if (twTitleBase) applyTwTitle();
    });
  }
  updateCalendarChips(); // 月相與農曆資料就緒後立即補顯示
  loadWeather();
  loadStock();
  loadGlobal();
  setInterval(function () {
    if (!wxManualLoc) wxLocKey = wxDefaultLoc(); // 未手動切換時，依上班時段自動回到預設地點
    loadWeather();
  }, 30 * 60 * 1000);
  setInterval(loadStock, 10 * 60 * 1000);
  setInterval(loadGlobal, 30 * 60 * 1000);
})();
</script>
