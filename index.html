<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日儀表板</title>
<style>
  :root {
    --text: #2C2C2B;
    --text2: #7D7A75;
    --seg-empty: #F0EFED;
    --dot-ring: rgba(0,0,0,0.18);
    --sun-day: #EBB670;
    --sun-night: #96A8C9;
    --mkt-closed: #EDEDEB;
    --sun-hand: #D5754A; /* 白天指針：比主題橘再沉穩一點 */
    --sun-hand-night: #57649E; /* 夜間指針：靛藍再淡一階，仍暗於夜弧 #96A8C9 */
    --dot-blue: #A9CDEC;
    --dot-green: #A8D3B8;
    --dot-amber: #E9CF95;
    --dot-lav: #C9B8E4;
    --dot-rose: #E9BCC8;
    --dot-teal: #A8D3D1;
    --seg-fill-a: #BFD9F2;
    --seg-fill-b: #8FBBE8;
    --chip-bg: #EAF3FB;
    --chip-text: #5B8FC7;
    /* 星期燈：平日柿橘、週末灰玫瑰，亮燈皆實心白字、同尺寸 */
    --wd-on: #E8683C;
    --wd-on-wknd: #D37790;
    --wd-off-bg: #FCEFE5;
    --wd-off-text: #C68C66;
    --wd-off-bg-wknd: #FAEFF2;
    --wd-off-text-wknd: #D194A3;
    /* 年度天數標籤：扁平內斂 */
    --doy-text: #8C8983;
    /* 分區細線 */
    --divider: rgba(0,0,0,0.12);
  }
  :root[data-theme="green"] {
    --seg-fill-a: #C2E0CE;
    --seg-fill-b: #85C29F;
    --chip-bg: #E9F4EE;
    --chip-text: #4F9C74;
  }
  :root[data-theme="amber"] {
    --seg-fill-a: #F0DFB6;
    --seg-fill-b: #DFBE72;
    --chip-bg: #FAF2DF;
    --chip-text: #A98938;
  }
  :root[data-theme="lav"] {
    --seg-fill-a: #DCD2EE;
    --seg-fill-b: #B29BDC;
    --chip-bg: #F2EEFA;
    --chip-text: #8A6FC0;
  }
  :root[data-theme="rose"] {
    --seg-fill-a: #F1D3DB;
    --seg-fill-b: #DFA0B2;
    --chip-bg: #FAEFF2;
    --chip-text: #BC7089;
  }
  :root[data-theme="teal"] {
    --seg-fill-a: #C5E3E1;
    --seg-fill-b: #82C6C3;
    --chip-bg: #E9F5F4;
    --chip-text: #4E9C99;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --text: #FFFFFF;
      --text2: rgba(255,255,255,0.65);
      --seg-empty: rgba(255,255,255,0.13);
      --dot-ring: rgba(255,255,255,0.35);
      --sun-day: rgba(236,175,110,0.78);
      --sun-night: rgba(135,158,205,0.7);
      --mkt-closed: rgba(170,170,170,0.2);
      --sun-hand: #D9814F; /* 白天指針（深色模式）：稍降亮度 */
      --sun-hand-night: #8194DF; /* 夜間指針（深色模式）：靛藍再淡一階 */
      --seg-fill-a: rgba(94,159,232,0.45);
      --seg-fill-b: rgba(94,159,232,0.85);
      --chip-bg: rgba(94,159,232,0.14);
      --chip-text: #8FB8E8;
      --wd-on: #E97C4E;
      --wd-on-wknd: #D17B92;
      --wd-off-bg: rgba(233,124,78,0.14);
      --wd-off-text: rgba(238,158,120,0.78);
      --wd-off-bg-wknd: rgba(228,150,173,0.14);
      --wd-off-text-wknd: rgba(238,175,193,0.8);
      --doy-text: rgba(255,255,255,0.62);
      --divider: rgba(255,255,255,0.18);
    }
    :root[data-theme="green"] {
      --seg-fill-a: rgba(114,188,143,0.45);
      --seg-fill-b: rgba(114,188,143,0.85);
      --chip-bg: rgba(114,188,143,0.14);
      --chip-text: #93CDA9;
    }
    :root[data-theme="amber"] {
      --seg-fill-a: rgba(224,190,114,0.45);
      --seg-fill-b: rgba(224,190,114,0.85);
      --chip-bg: rgba(224,190,114,0.14);
      --chip-text: #DCC183;
    }
    :root[data-theme="lav"] {
      --seg-fill-a: rgba(178,155,220,0.45);
      --seg-fill-b: rgba(178,155,220,0.85);
      --chip-bg: rgba(178,155,220,0.14);
      --chip-text: #C3B0E4;
    }
    :root[data-theme="rose"] {
      --seg-fill-a: rgba(223,160,178,0.45);
      --seg-fill-b: rgba(223,160,178,0.85);
      --chip-bg: rgba(223,160,178,0.14);
      --chip-text: #E4B3C1;
    }
    :root[data-theme="teal"] {
      --seg-fill-a: rgba(130,198,195,0.45);
      --seg-fill-b: rgba(130,198,195,0.85);
      --chip-bg: rgba(130,198,195,0.14);
      --chip-text: #9AD0CD;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: transparent; }
  body {
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    display: flex;
    flex-wrap: wrap; /* 讓新聞列可換行到儀表下方 */
    align-items: center;
    justify-content: center;
    padding: 8px 24px;
  }
  .wrap {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .main {
    flex: 1 1 auto;
    min-width: 0;
  }
  /* ---- top line: date + day ring + time ---- */
  .line {
    display: flex;
    align-items: baseline;
    gap: 9px;
    flex-wrap: wrap;
  }
  .date {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  /* 星期標籤：與「第 N 天」同家族，平日柿橘、週末灰玫瑰 */
  .wd-chip {
    background: var(--wd-off-bg);
    color: var(--wd-on);
    border-radius: 4px;
    padding: 0 5px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
  }
  .wd-chip.wknd {
    background: var(--wd-off-bg-wknd);
    color: var(--wd-on-wknd);
  }
  body.ready .wd-chip { transition: background 0.3s ease, color 0.3s ease; }
  /* ---- 分區細線：時間與週曆之間 ---- */
  .vdiv {
    flex: 0 0 auto;
    align-self: center;
    width: 1px;
    height: 30px;
    border-radius: 0.5px;
    background: var(--divider);
  }
  /* ---- 迷你雙週曆（時間與主題色點之間） ---- */
  .weekcal {
    flex: 0 0 auto;
    align-self: center;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .wc-row {
    display: grid;
    grid-template-columns: repeat(7, 18px);
    gap: 2px;
    justify-items: center;
    align-items: center;
  }
  .wc-head span {
    font-size: 9px;
    font-weight: 600;
    line-height: 1;
    color: var(--text2);
    user-select: none;
  }
  .wc-head span.wknd { color: var(--wd-off-text-wknd); }
  .wc-days span {
    width: 18px;
    height: 15px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    color: var(--text2);
    user-select: none;
  }
  .wc-days { row-gap: 4px; }
  .wc-days span.wknd { color: var(--wd-off-text-wknd); }
  .wc-days span.today { background: var(--wd-on); color: #FFFFFF; }
  .wc-days span.today.wknd { background: var(--wd-on-wknd); }
  .doy-chip.s-spring { background: rgba(120,180,130,0.18); color: #55875B; }
  .doy-chip.s-summer { background: rgba(226,132,110,0.18); color: #C2604F; }
  .doy-chip.s-autumn { background: rgba(226,178,96,0.2); color: #A9702B; }
  .doy-chip.s-winter { background: rgba(120,155,215,0.18); color: #5578A9; }
  .doy-chip.term { background: #F7E7CB; color: #A9702B; }
  .doy-chip {
    background: var(--seg-empty);
    color: var(--doy-text);
    border-radius: 4px;
    padding: 0 5px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
  }
  /* ---- 天氣膠囊：與「第 N 天」同家族 ---- */
  .wx-chip {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    background: var(--chip-bg);
    border-radius: 4px;
    padding: 0 6px;
    line-height: 15px;
    font-size: 10.5px;
    font-weight: 500;
    align-self: center;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }
  .wx-chip[hidden] { display: none; }

  .etf-tris { display: inline-flex; align-items: center; gap: 2px; font-size: 8px; line-height: 15px; }
  .etf-tris[hidden] { display: none; }
  /* 階層色以台股指數漲跌色為基準（第2階＝#C1867D／#7FA98E 本色），向淺深兩端拉開 */
  .etf-tris .t-u1, #twChg.t-u1 { color: #DCB3AC; }
  .etf-tris .t-u2, #twChg.t-u2 { color: #C1867D; }
  .etf-tris .t-u3, #twChg.t-u3 { color: #A2584E; }
  .etf-tris .t-u4, #twChg.t-u4 { color: #7E2E24; }
  .etf-tris .t-d1, #twChg.t-d1 { color: #ABC8B6; }
  .etf-tris .t-d2, #twChg.t-d2 { color: #7FA98E; }
  .etf-tris .t-d3, #twChg.t-d3 { color: #578466; }
  .etf-tris .t-d4, #twChg.t-d4 { color: #305C41; }
  .etf-tris .t-f, #twChg.t-f { color: #B9B4AC; }
  #twChg { font-weight: 600; }
  @media (prefers-color-scheme: dark) {
    /* 深色模式以「灰淡→鮮濃」表現深淺：幅度越大色彩越濃越醒目 */
    .etf-tris .t-u1, #twChg.t-u1 { color: #8F6D67; }
    .etf-tris .t-u2, #twChg.t-u2 { color: #B4867D; }
    .etf-tris .t-u3, #twChg.t-u3 { color: #D8A093; }
    .etf-tris .t-u4, #twChg.t-u4 { color: #F8BCA9; }
    .etf-tris .t-d1, #twChg.t-d1 { color: #6E8B7A; }
    .etf-tris .t-d2, #twChg.t-d2 { color: #8BAE97; }
    .etf-tris .t-d3, #twChg.t-d3 { color: #A8D2B6; }
    .etf-tris .t-d4, #twChg.t-d4 { color: #C5F5D5; }
    .etf-tris .t-f, #twChg.t-f { color: #6E6961; }
  }
  .wx-ic {
    font-size: 11px;
    line-height: 15px;
  }
  .wx-t { font-weight: 600; }
  .wx-item {
    display: inline-flex;
    align-items: center;
    gap: 3px;
  }
  .wx-up { color: #C1867D; font-weight: 600; }
  .wx-down { color: #7FA98E; font-weight: 600; }
  .wx-flat { color: var(--text2); font-weight: 600; }
  .wx-lab { color: var(--text2); font-weight: 500; }
  #wx { cursor: pointer; }
  .moon-ic { font-size: 12px; line-height: 15px; align-self: center; user-select: none; }
  #tw.mkt-closed { background: var(--mkt-closed); }
  #tw.mkt-open-up { background: #F6E8E4; }
  #tw.mkt-open-down { background: #E7F0EA; }
  .wx-aqi-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #9AA0A6;
    flex: 0 0 auto;
  }
  .time-group {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    align-self: center;
  }
  .dayring {
    display: block;
    transform: rotate(-90deg);
  }
  .ring-base {
    fill: var(--chip-bg);
  }
  .ring-fill {
    fill: none;
    stroke: var(--seg-fill-b);
    stroke-width: 9;
  }
  body.ready .ring-fill { transition: stroke-dasharray 0.8s ease; }
  /* 日照時鐘：自訂角度（正午在上、午夜在下），不套用 -90deg 旋轉 */
  #sunring { transform: none; }
  #sunDayArc { fill: none; stroke: var(--sun-day); stroke-width: 5.8; }
  #sunNightArc { fill: none; stroke: var(--sun-night); stroke-width: 5.8; }
  #sunHand { fill: var(--sun-hand); }
  #sunring.night #sunHand { fill: var(--sun-hand-night); }
  .time {
    font-size: 21px;
    font-weight: 650;
    line-height: 1.05;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .time .sec {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
  }
  /* ---- segmented year progress ---- */
  .bar-row {
    margin-top: 9px;
    display: flex;
    align-items: center;
    gap: 9px;
  }
  .bar-label {
    flex: 0 0 auto;
    font-size: 11px;
    color: var(--text2);
    white-space: nowrap;
  }
  .segments {
    flex: 1 1 auto;
    display: flex;
    gap: 3px;
    height: 6px;
  }
  .seg {
    flex: 1 1 0;
    background: var(--seg-empty);
    border-radius: 3px;
    overflow: hidden;
  }
  .seg-inner {
    display: block;
    height: 100%;
    width: 0%;
    border-radius: inherit;
  }
  body.ready .seg-inner { transition: width 0.8s ease; }
  .bar-pct {
    flex: 0 0 auto;
    font-size: 11px;
    color: var(--text2);
    font-variant-numeric: tabular-nums;
    text-align: right;
    white-space: nowrap;
  }
  /* ---- theme dots (right edge) ---- */
  .dots {
    flex: 0 0 auto;
    display: grid;
    grid-template-rows: repeat(3, auto);
    grid-auto-flow: column;
    gap: 3px;
  }
  .dot {
    width: 11px;
    height: 11px;
    border: none;
    background: transparent;
    padding: 0;
    position: relative;
    cursor: pointer;
  }
  .dot::before {
    content: "";
    position: absolute;
    inset: 2px;
    border-radius: 50%;
    background: var(--c);
    opacity: 0.8;
    transition: opacity 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
  }
  .dot:hover::before { opacity: 1; transform: scale(1.12); }
  .dot.active::before {
    opacity: 1;
    box-shadow: 0 0 0 2px var(--dot-ring);
  }
  .dot:focus-visible { outline: none; }
  .dot:focus-visible::before { box-shadow: 0 0 0 2px var(--dot-ring), 0 0 0 4px var(--chip-bg); }
  .dot-blue  { --c: var(--dot-blue); }
  .dot-green { --c: var(--dot-green); }
  .dot-amber { --c: var(--dot-amber); }
  .dot-lav   { --c: var(--dot-lav); }
  .dot-rose  { --c: var(--dot-rose); }
  .dot-teal  { --c: var(--dot-teal); }
  /* ---- 響應���排版 ---- */
  .lbrk { display: none; } /* ������版換行���：桌面不顯�� */
  /* 中幅（窄視窗／平板）：先收掉右側雙週曆 */
  @media (max-width: 760px) {
    .weekcal, .vdiv { display: none; }
  }
  /* 手機版：改為固定三行式排版，隱藏次要資訊
     第一行：日期＋週幾＋月相（左）、日照輪＋時鐘（右）
     第二行：天氣膠囊＋台股膠囊
     第三行：今年進度列
     隱藏：週／日進度環、秒數、雙週曆、主題色點、第N天／農曆膠囊 */
  @media (max-width: 520px) {
    body { padding: 8px 14px; }
    .line { row-gap: 7px; }
    .time-group { order: 2; gap: 7px; margin-right: 46px; /* 避開 Notion 手機版右上角的浮動選單 */ }
    .lbrk { display: block; order: 3; flex-basis: 100%; height: 0; }
    .wx-chip { order: 4; }
    .time { font-size: 19px; }
    .time .sec { display: none; }
    #weekring, #dayring { display: none; }
    .dots { display: none; }
    .doy-chip { display: none; }
    .wx-chip .wx-lab { display: none; }
    .bar-row { margin-top: 8px; }
    .segments { gap: 2px; }
  }
  /* ---- 新聞輪替列（GNews）：一次一則、淡入淡出輪替，可收合 ---- */
  .news-row { position: relative; flex: 1 1 100%; display: flex; align-items: center; gap: 7px; margin: 7px 4px 0; padding-top: 6px; border-top: 1px solid rgba(0,0,0,0.07); font-size: 12px; line-height: 17px; min-height: 18px; }
  .news-row[hidden] { display: none; }
  .news-tag { flex: none; font-size: 10px; line-height: 15px; padding: 0 7px; border-radius: 8px; background: #EFE9DF; color: #8A7A62; font-weight: 600; letter-spacing: 1px; }
  .news-tag.nt-intl { background: #EAF3FB; color: #5B8FC7; }
  .news-tag.nt-fin { background: #FAF2DF; color: #A98938; }
  .news-tag.nt-tech { background: #E9F5F4; color: #4E9C99; }
  .news-item { flex: 1 1 auto; min-width: 0; display: inline-flex; align-items: baseline; gap: 7px; opacity: 1; transform: translateY(0); transition: opacity .4s ease, transform .4s ease; }
  .news-item.fading { opacity: 0; transform: translateY(3px); }
  .news-a { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: inherit; opacity: .85; text-decoration: none; font-weight: 500; }
  .news-a:hover { opacity: 1; text-decoration: underline; }
  .news-src { flex: none; color: var(--text2); opacity: .75; font-size: 10.5px; }
  .news-btn { flex: none; border: 0; background: none; cursor: pointer; padding: 0 2px; color: var(--text2); font-size: 10px; line-height: 16px; opacity: .5; }
  .news-btn:hover { opacity: 1; }
  .news-nav { font-size: 11px; padding: 0 1px; }
  .news-row.off { display: none; }
  .news-toggle { border: 0; background: none; cursor: pointer; padding: 0 2px; font-size: 12px; line-height: 15px; align-self: center; opacity: .9; transition: opacity .25s ease, filter .25s ease; }
  .news-toggle.off { opacity: .3; filter: grayscale(1); }
  .news-pop { position: absolute; left: 48px; right: 48px; bottom: calc(100% + 8px); z-index: 30; background: #FFFEFB; border: 1px solid rgba(0,0,0,0.08); border-radius: 10px; box-shadow: 0 8px 26px rgba(0,0,0,0.12); padding: 10px 13px; font-size: 12px; line-height: 1.7; color: inherit; }
  .news-pop[hidden] { display: none; }
  .news-pop .np-t { display: block; font-weight: 600; margin-bottom: 3px; }
  .news-pop .np-m { display: block; margin-top: 5px; font-size: 10.5px; color: var(--text2); opacity: .85; }
  #tw { cursor: pointer; }
  @media (prefers-color-scheme: dark) {
    .news-row { border-top-color: rgba(255,255,255,0.09); }
    .news-tag { background: rgba(255,255,255,0.08); color: #B9AB94; }
    .news-tag.nt-intl { background: rgba(94,159,232,0.14); color: #8FB8E8; }
    .news-tag.nt-fin { background: rgba(224,190,114,0.14); color: #DCC183; }
    .news-tag.nt-tech { background: rgba(78,156,153,0.16); color: #7FC4C1; }
    .news-pop { background: #33322E; border-color: rgba(255,255,255,0.12); box-shadow: 0 8px 26px rgba(0,0,0,0.5); }
  }
  @media (max-width: 520px) { .news-src { display: none; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="main">
      <div class="line">
        <span class="date" id="date">—</span>
        <span class="wd-chip" id="wdchip" role="img" aria-label="星期">—</span>
        <span class="moon-ic" id="moon" role="img" aria-label="月相" hidden>—</span>
        <span class="wx-chip" id="wx" hidden role="img" aria-label="台中即時天氣">
          <span class="wx-item"><span class="wx-lab" id="wxLoc">—</span></span>
          <span class="wx-item"><span class="wx-ic" id="wxIcon">—</span><span class="wx-t" id="wxTemp">--��</span></span>
          <span class="wx-item"><span class="wx-lab">☔</span><span id="wxRain">--%</span></span>
          <span class="wx-item"><span class="wx-aqi-dot" id="wxAqiDot" aria-hidden="true"></span><span id="wxAqi">--</span></span>
        </span>
        <span class="wx-chip" id="tw" hidden role="img" aria-label="台股加權指數">

<script>
(function () {
  "use strict";
  var WEEKDAYS = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
  var SEG_COUNT = 12; /* 12 個月，上色處即當月進度 */
  var THEMES = ["blue", "green", "amber", "lav", "rose", "teal"];
  var RING_C = 2 * Math.PI * 4.5;
  function pad(n) { return n < 10 ? "0" + n : "" + n; }
  function setText(id, v) { document.getElementById(id).textContent = v; }

  var segContainer = document.getElementById("segments");
  var ringFill = document.getElementById("ringFill");
  var weekFill = document.getElementById("weekFill");

  // ---- 日照時鐘：台中日出日落（NOAA 簡化公式，本地計算免 API） ----
  var SUN_LAT = 24.135, SUN_LON = 120.68, SUN_R = 6.4;
  var sunKey = "", sunRise = 5.5, sunSet = 18.5;
  function computeSunTimes(d) {
    var rad = Math.PI / 180;
    var N = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
    var lngHour = SUN_LON / 15;
    function calc(rising) {
      var t = N + ((rising ? 6 : 18) - lngHour) / 24;
      var M = 0.9856 * t - 3.289;
      var L = M + 1.916 * Math.sin(M * rad) + 0.02 * Math.sin(2 * M * rad) + 282.634;
      L = (L % 360 + 360) % 360;
      var RA = Math.atan(0.91764 * Math.tan(L * rad)) / rad;
      RA = (RA % 360 + 360) % 360;
      RA = (RA + Math.floor(L / 90) * 90 - Math.floor(RA / 90) * 90) / 15;
      var sinDec = 0.39782 * Math.sin(L * rad);
      var cosDec = Math.cos(Math.asin(sinDec));
      var cosH = (Math.cos(90.833 * rad) - sinDec * Math.sin(SUN_LAT * rad)) / (cosDec * Math.cos(SUN_LAT * rad));
      if (cosH > 1) return rising ? 6 : 18;
      if (cosH < -1) return rising ? 0 : 24;
      var H = (rising ? 360 - Math.acos(cosH) / rad : Math.acos(cosH) / rad) / 15;
      var T = H + RA - 0.06571 * t - 6.622;
      return ((T - lngHour + 8) % 24 + 24) % 24; // 台灣 UTC+8
    }
    return [calc(true), calc(false)];
  }
  // 將時刻映射到圓上：正午在頂、午夜在底，順時針
  function sunPt(t, r) {
    var a = ((t - 12) / 24) * 2 * Math.PI;
    return [(10 + r * Math.sin(a)).toFixed(2), (10 - r * Math.cos(a)).toFixed(2)];
  }
  function sunArc(t1, t2) {
    var p1 = sunPt(t1, SUN_R), p2 = sunPt(t2, SUN_R);
    var span = ((t2 - t1) % 24 + 24) % 24 / 24 * 360;
    return "M " + p1[0] + " " + p1[1] + " A " + SUN_R + " " + SUN_R + " 0 " + (span > 180 ? 1 : 0) + " 1 " + p2[0] + " " + p2[1];
  }
  function fmtHM(h) {
    var hh = Math.floor(h), mm = Math.round((h - hh) * 60);
    if (mm === 60) { hh = (hh + 1) % 24; mm = 0; }
    return pad(hh) + ":" + pad(mm);
  }
  function fmtDur(h) {
    var m = Math.round(h * 60);
    var hh = Math.floor(m / 60), mm = m % 60;
    return (hh > 0 ? hh + " 小時 " : "") + mm + " 分";
  }
  function updateSunRing(now) {
    var key = now.getFullYear() + "-" + now.getMonth() + "-" + now.getDate();
    if (key !== sunKey) {
      sunKey = key;
      var st = computeSunTimes(now);
      sunRise = st[0]; sunSet = st[1];
      document.getElementById("sunDayArc").setAttribute("d", sunArc(sunRise, sunSet));
      document.getElementById("sunNightArc").setAttribute("d", sunArc(sunSet, sunRise));
    }
    var tNow = now.getHours() + now.getMinutes() / 60 + now.getSeconds() / 3600;
    // 水滴指針：尖端朝外，隨時間繞環心順時針旋轉
    document.getElementById("sunHand").setAttribute("transform", "rotate(" + (((tNow - 12) / 24) * 360).toFixed(2) + " 10 10)");
    var isDay = tNow >= sunRise && tNow < sunSet;
    document.getElementById("sunring").classList.toggle("night", !isDay);
    var nextTxt = isDay ? "距日落 " + fmtDur(sunSet - tNow) : "距日出 " + fmtDur(((sunRise - tNow) % 24 + 24) % 24);
    // 白天標日光時長、夜間標夜間時長
    var spanTxt = isDay ? "日光 " + fmtDur(sunSet - sunRise) : "夜間 " + fmtDur(24 - (sunSet - sunRise));
    setText("sunTitle", "日出 " + fmtHM(sunRise) + "｜日落 " + fmtHM(sunSet) + "｜" + spanTxt + "｜" + nextTxt);
  }
  var wdChip = document.getElementById("wdchip");
  var wcDays = document.getElementById("wcdays");
  var weekcal = document.getElementById("weekcal");
  var lastDateKey = "";
  var fills = [];
  var styles = getComputedStyle(document.documentElement);

  function parseColor(v) {
    var s = v.trim();
    if (s.charAt(0) === "#") {
      return [parseInt(s.substr(1, 2), 16), parseInt(s.substr(3, 2), 16), parseInt(s.substr(5, 2), 16), 1];
    }
    var m = s.match(/rgba?\(([^)]+)\)/);
    if (m) {
      var p = m[1].split(",").map(parseFloat);
      return [p[0], p[1], p[2], p.length > 3 ? p[3] : 1];
    }
    return [143, 187, 232, 1];
  }
  function mix(a, b, t) {
    var r = [];
    for (var i = 0; i < 4; i++) r[i] = a[i] + (b[i] - a[i]) * t;
    return "rgba(" + Math.round(r[0]) + "," + Math.round(r[1]) + "," + Math.round(r[2]) + "," + r[3].toFixed(3) + ")";
  }
  function buildSegments() {
    var ca = parseColor(styles.getPropertyValue("--seg-fill-a"));
    var cb = parseColor(styles.getPropertyValue("--seg-fill-b"));
    segContainer.innerHTML = "";
    fills = [];
    for (var i = 0; i < SEG_COUNT; i++) {
      var seg = document.createElement("span");
      seg.className = "seg";
      var inner = document.createElement("span");
      inner.className = "seg-inner";
      inner.style.background = mix(ca, cb, SEG_COUNT === 1 ? 0 : i / (SEG_COUNT - 1));
      seg.appendChild(inner);
      segContainer.appendChild(seg);
      fills.push(inner);
    }
  }

  function tick() {
    var now = new Date();
    setText("hm", pad(now.getHours()) + ":" + pad(now.getMinutes()));
    setText("ss", pad(now.getSeconds()));
    setText("date", now.getFullYear() + " 年 " + (now.getMonth() + 1) + " 月 " + now.getDate() + " 日");
    var day = now.getDay();
    wdChip.textContent = WEEKDAYS[day];
    wdChip.classList.toggle("wknd", day === 0 || day === 6);
    wdChip.setAttribute("aria-label", "今天" + WEEKDAYS[day]);

    // 迷你週曆：換日才重建
    var dateKey = now.getFullYear() + "-" + now.getMonth() + "-" + now.getDate();
    if (dateKey !== lastDateKey) {
      lastDateKey = dateKey;
      wcDays.innerHTML = "";
      var ws = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day);
      for (var d = 0; d < 14; d++) {
        var cell = new Date(ws.getFullYear(), ws.getMonth(), ws.getDate() + d);
        var el = document.createElement("span");
        el.textContent = cell.getDate();
        var col = d % 7;
        if (col === 0 || col === 6) el.classList.add("wknd");
        if (d === day) el.classList.add("today");
        wcDays.appendChild(el);
      }
      weekcal.setAttribute("aria-label", "雙週日曆，今天 " + (now.getMonth() + 1) + " 月 " + now.getDate() + " 日" + WEEKDAYS[day]);
    }

    var dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
    setText("yearline", "第 " + dayOfYear + " 天");
    updateCalendarChips();

    // 今日進度：12 小時一輪。0-12 時由缺到滿；12-24 時由滿到缺（皆順時針推進）
    var midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    var hrs = (now - midnight) / 3600000;
    var ringRatio = hrs < 12 ? hrs / 12 : (24 - hrs) / 12;
    ringFill.style.strokeDasharray = (ringRatio * RING_C).toFixed(2) + " " + RING_C.toFixed(2);
    // 下午段用負 dashoffset 讓弧的起點順時針前進、終點固定在頂部，消去時同樣順時針
    ringFill.style.strokeDashoffset = hrs < 12 ? "0" : (-(1 - ringRatio) * RING_C).toFixed(2);
    setText("ringTitle", "今日進度 " + (hrs / 24 * 100).toFixed(0) + "%");

    // 本週進度（週日起、週六止）
    var weekStart = new Date(now.getFullYear(), now.getMonth(), now.getDate() - day);
    var weekRatio = (now - weekStart) / 604800000;
    weekFill.style.strokeDasharray = (weekRatio * RING_C).toFixed(2) + " " + RING_C.toFixed(2);
    setText("weekTitle", "本週進度 " + (weekRatio * 100).toFixed(1) + "%");
    updateSunRing(now);

    // 今年進度（分段��
    var yearStart = new Date(now.getFullYear(), 0, 1);
    var yearEnd = new Date(now.getFullYear() + 1, 0, 1);
    var yearRatio = (now - yearStart) / (yearEnd - yearStart);
    var yearPct = yearRatio * 100;
    setText("yearpct", yearPct.toFixed(1) + "%");
    segContainer.setAttribute("aria-valuenow", yearPct.toFixed(1));

    var month = now.getMonth();
    for (var i = 0; i < SEG_COUNT; i++) {
      var f;
      if (i < month) {
        f = 1;
      } else if (i > month) {
        f = 0;
      } else {
        var mStart = new Date(now.getFullYear(), i, 1);
        var mEnd = new Date(now.getFullYear(), i + 1, 1);
        f = (now - mStart) / (mEnd - mStart);
      }
      fills[i].style.width = (f * 100).toFixed(1) + "%";
    }
  }

  // ---- 主題切換 ----
  var dots = document.querySelectorAll(".dot");
  function applyTheme(t, save) {
    if (THEMES.indexOf(t) < 0) t = "blue";
    document.documentElement.setAttribute("data-theme", t);
    for (var i = 0; i < dots.length; i++) {
      var on = dots[i].getAttribute("data-theme") === t;
      dots[i].classList.toggle("active", on);
      dots[i].setAttribute("aria-pressed", on ? "true" : "false");
    }
    if (save) {
      try { localStorage.setItem("dash-theme", t); } catch (e) {}
    }
    styles = getComputedStyle(document.documentElement);
    buildSegments();
    tick();
  }
  for (var i = 0; i < dots.length; i++) {
    dots[i].addEventListener("click", function () {
      applyTheme(this.getAttribute("data-theme"), true);
    });
  }

  if (window.matchMedia) {
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", function () {
      styles = getComputedStyle(document.documentElement);
      buildSegments();
      tick();
    });
  }

  // 初始主題：網址 hash > 上次選擇 > 淡藍
  var initTheme = (location.hash || "").replace("#", "");
  if (THEMES.indexOf(initTheme) < 0) {
    try { initTheme = localStorage.getItem("dash-theme") || "blue"; } catch (e) { initTheme = "blue"; }
  }
  applyTheme(initTheme, false);

  requestAnimationFrame(function () {
    requestAnimationFrame(function () {
      document.body.classList.add("ready");
    });
  });
  setInterval(tick, 1000);

  // ---- 月相與農曆（本機天文公式計算，不需連線） ----
  var MOON_EMOJI = ["\uD83C\uDF11", "\uD83C\uDF12", "\uD83C\uDF13", "\uD83C\uDF14", "\uD83C\uDF15", "\uD83C\uDF16", "\uD83C\uDF17", "\uD83C\uDF18"];
  var MOON_NAMES = ["新月", "眉月", "上弦月", "盈凸月", "滿月", "虧凸月", "下弦月", "殘月"];
  function moonInfo(d) {
    var syn = 29.530588853, rad = Math.PI / 180;
    function rev(x) { x = x % 360; return x < 0 ? x + 360 : x; }
    function elongAt(t) {
      var Ms = rev(357.5291 + 0.98560028 * t);
      var sunLon = rev(280.459 + 0.98564736 * t) + 1.915 * Math.sin(Ms * rad) + 0.02 * Math.sin(2 * Ms * rad);
      var Lm = rev(218.316 + 13.176396 * t);
      var Mm = rev(134.963 + 13.064993 * t);
      var D = rev(297.850 + 12.190749 * t);
      // 月球真黃經：含中心差、出差、二均差等主要攝�����項
      var lon = Lm + 6.289 * Math.sin(Mm * rad) - 1.274 * Math.sin((Mm - 2 * D) * rad)
        + 0.658 * Math.sin(2 * D * rad) - 0.214 * Math.sin(2 * Mm * rad) - 0.186 * Math.sin(Ms * rad)
        - 0.059 * Math.sin((2 * Mm - 2 * D) * rad) - 0.057 * Math.sin((Mm - 2 * D + Ms) * rad)
        + 0.053 * Math.sin((Mm + 2 * D) * rad) + 0.046 * Math.sin((2 * D - Ms) * rad)
        + 0.041 * Math.sin((Mm - Ms) * rad) - 0.035 * Math.sin(D * rad) - 0.031 * Math.sin((Mm + Ms) * rad);
      return rev(lon - sunLon);
    }
    var t = (d.getTime() - 946728000000) / 86400000; // J2000 起算天數
    var elong = elongAt(t);
    // 月齡＝距上次朔（新月）的實際天數，用牛頓法回推朔的時刻
    var tNew = t - elong / 12.190749;
    for (var i = 0; i < 4; i++) {
      var e2 = elongAt(tNew);
      tNew -= ((e2 + 180) % 360 - 180) / 12.190749;
    }
    var age = t - tNew;
    var idx = Math.floor(elong / 45 + 0.5) % 8;
    return { emoji: MOON_EMOJI[idx], name: MOON_NAMES[idx], age: age };
  }
  var LUNAR_DAYS = ["", "初一", "初二", "初三", "初四", "初五", "初六", "初七", "初八", "初九", "初十",
    "十一", "十二", "十三", "十四", "十五", "十六", "十七", "十八", "十九", "二十",
    "廿一", "廿二", "廿三", "廿四", "廿五", "廿六", "廿七", "廿八", "廿九", "三十"];
  var LUNAR_MONTHS = ["正月", "二月", "三月", "四月", "五月", "六月", "七月", "八月", "九月", "十月", "十一月", "十二月"];
  function lunarText(d) {
    try {
      var parts = new Intl.DateTimeFormat("zh-Hant-u-ca-chinese", { month: "long", day: "numeric" }).formatToParts(d);
      var mon = "", day = 0;
      for (var i = 0; i < parts.length; i++) {
        if (parts[i].type === "month") mon = parts[i].value;
        if (parts[i].type === "day") day = parseInt(parts[i].value, 10);
      }
      if (!mon || !day || !LUNAR_DAYS[day]) return null;
      if (mon.indexOf("月") < 0) {
        var mNum = parseInt(mon, 10);
        mon = (isFinite(mNum) && LUNAR_MONTHS[mNum - 1]) ? LUNAR_MONTHS[mNum - 1] : mon + "月";
      }
      return mon + LUNAR_DAYS[day];
    } catch (e) { return null; }
  }
  // 24 節氣（壽星通用公式，21 世紀係數）
  var TERM_NAMES = ["小寒", "大寒", "立春", "雨水", "驚蟄", "春分", "清明", "穀雨", "立夏", "小滿", "芒種", "夏至",
    "小暑", "大暑", "��秋", "處暑", "白露", "秋分", "寒露", "霜降", "立���", "小雪", "大雪", "冬至"];
  var TERM_C = [5.4055, 20.12, 3.87, 18.73, 5.63, 20.646, 4.81, 20.1, 5.52, 21.04, 5.678, 21.37,
    7.108, 22.83, 7.5, 23.13, 7.646, 23.042, 8.318, 23.438, 7.438, 22.36, 7.18, 21.94];
  function solarTermOf(d) {
    var y = d.getFullYear() % 100, day = d.getDate();
    for (var k = 0; k < 2; k++) {
      var i = d.getMonth() * 2 + k;
      var L = i < 4 ? Math.floor((y - 1) / 4) : Math.floor(y / 4);
      if (day === Math.floor(y * 0.2422 + TERM_C[i]) - L) return TERM_NAMES[i];
    }
    return null;
  }
  var moonRiseTxt = null, moonSetTxt = null, moonTimesKey = "";
  function loadMoonTimes(key) {
    moonTimesKey = key;
    var d = new Date();
    var dstr = d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
    fetchJson("https://opendata.cwa.gov.tw/api/v1/rest/datastore/A-B0063-001?CountyName=" + encodeURIComponent("臺中市") + "&Date=" + dstr)
      .then(function (j) {
        var locs = j && j.records && j.records.locations;
        var loc = locs && locs.location && locs.location[0];
        var times = (loc && (loc.time || loc.Time)) || [];
        var t = null;
        for (var i = 0; i < times.length; i++) {
          var dt = String(times[i].Date || times[i].date || "");
          if (dt.indexOf(dstr) === 0) { t = times[i]; break; }
        }
        if (!t) t = times[0];
        if (!t) return;
        function pickTime(o, kw) {
          // 先剔除 rise 字段名再比對，避免 MoonRiseTime 裡的 riSETime 誤判為 set
          for (var k in o) {
            var kk = k.toLowerCase().split("rise").join(kw === "rise" ? "rise" : "");
            if (kk.indexOf(kw) >= 0 && /^\d{1,2}:\d{2}/.test(String(o[k]))) return String(o[k]).slice(0, 5);
          }
          return null;
        }
        moonRiseTxt = pickTime(t, "rise");
        moonSetTxt = pickTime(t, "set");
        var moonEl = document.getElementById("moon");
        if (!moonEl.hidden) {
          var mi = moonInfo(new Date());
          moonEl.title = "月相：" + mi.name + "（月齡 " + mi.age.toFixed(1) + " 天）"
            + "\n月出 " + (moonRiseTxt || "—") + "｜月落 " + (moonSetTxt || "��");
        }
      })
      .catch(function () { /* 抓不到就先不顯示 */ });
  }
  function seasonOf(d) {
    // 以四立（立春 2/4、立夏 5/5、立秋 8/7、立冬 11/7 前後）劃分四季
    var md = (d.getMonth() + 1) * 100 + d.getDate();

      // 依性質分段：台股期現貨量能／國際行情／利匯率與風險，段落間空一行較易讀
      var s1 = [], s2 = [], s3 = [];
      if (by.txf.length) s1.push("台指期：" + by.txf.join("｜"));
      if (by.mgn.length) s1.push("量能資券：" + by.mgn.join("｜"));
      if (by.asia.length) s2.push("亞股：" + by.asia.join("｜"));
      if (by.us.length) s2.push("美股：" + by.us.join("｜"));
      if (by.cmd.length) s2.push("商品：" + by.cmd.join("｜"));
      if (by.fx.length) s3.push("利率匯率：" + by.fx.join("｜"));
      if (by.risk.length) s3.push("風險：" + by.risk.join("｜"));
      var secs = [];
      if (s1.length) secs.push(s1.join("\n"));
      if (s2.length) secs.push(s2.join("\n"));
      if (s3.length) secs.push(s3.join("\n"));
      globalNote = secs.join("\n\n");
      if (secs.length) globalUpdT = new Date();
      if (twTitleBase) applyTwTitle();
    });
  }
  updateCalendarChips(); // 月相與農曆資料就緒後立即補顯示
  loadWeather();
  loadStock();
  loadTwQuotes(); loadOtcIdx();
  loadGlobal();
  setInterval(function () {
    if (!wxManualLoc) wxLocKey = wxDefaultLoc(); // 未手動切換時，依上班時段自動回到預設地��
    loadWeather();
  }, 30 * 60 * 1000);
  setInterval(function () { loadStock(); loadTwQuotes(); loadOtcIdx(); }, 10 * 60 * 1000);
  // 點一下台股膠囊立即更新（台股＋全球行情；5 秒內重複點擊不重抓）
  (function () {
    var twChip = document.getElementById("tw"), lastTap = 0;
    twChip.addEventListener("click", function () {
      var n2 = Date.now();
      if (n2 - lastTap < 5000) return;
      lastTap = n2;
      loadStock(); loadTwQuotes(); loadOtcIdx(); loadGlobal();
    });
  })();
  setInterval(loadGlobal, 30 * 60 * 1000);
  // ---- 新聞輪替列（中央社／BBC 中文／自由時報 官方 RSS）：即時、免金鑰；只留 36 小時內頭條，依 國際 > 財經 > 產業 優先排序 ----
  var NEWS_FEEDS = [
    ["國際", "https://feeds.feedburner.com/rsscna/intworld", "中央社"],
    ["國際", "https://feeds.bbci.co.uk/zhongwen/trad/rss.xml", "BBC中文"],
    ["國際", "https://news.ltn.com.tw/rss/world.xml", "自由時報"],
    ["國際", "https://reutersnew.buzzing.cc/zh-Hant/feed.xml", "路透社"],
    ["財經", "https://feeds.feedburner.com/rsscna/finance", "中央社"],
    ["財經", "https://news.ltn.com.tw/rss/business.xml", "自由時報"],
    ["產業", "https://feeds.feedburner.com/rsscna/technology", "中央社"]
  ];
  var NEWS_ORDER = [["國際", 8], ["財經", 6], ["產業", 5]]; // 每類上限，同類單一來源最多 3 則，避免單家洗版
  var NEWS_TAGCLS = { "國際": "nt-intl", "財經": "nt-fin", "產業": "nt-tech" };
  var NEWS_SKIP = /廣編|贊助|優惠|折扣|抽獎|開獎|團購|好康|盤點概念股|同學會|樂透|今彩|威力彩|頭獎|發票|新聞360|自由說新聞|請見影片/;
  var NEWS_LINKSKIP = /reuters\.com\/(sports|fact-check|lifestyle|pt|es|de|fr|it|ja|ar|he|ru)\//; // 路透聚合源：略過體育・查核・非英文版重複條目 // 擋掉廣宣・導購・樂透開獎類雜訊
  var newsItems = [], newsIdx = 0, newsTimer = null, newsHover = false;
  function newsAgo(iso) {
    var t0 = new Date(iso).getTime();
    if (!isFinite(t0)) return "";
    var m = Math.max(1, Math.round((Date.now() - t0) / 60000));
    return m < 60 ? m + " 分鐘前" : m < 1440 ? Math.round(m / 60) + " 小時前" : Math.round(m / 1440) + " 天前";
  }
  function showNews(i, instant) {
    var it = newsItems[i];
    if (!it) return;
    var box = document.getElementById("newsItem");
    var apply = function () {
      var tagEl = document.getElementById("newsTag");
      tagEl.textContent = it.tag;
      tagEl.className = "news-tag " + (NEWS_TAGCLS[it.tag] || "");
      var a = document.getElementById("newsA");
      a.textContent = it.title;
      a.href = it.url;
      var ago = newsAgo(it.at);
      document.getElementById("newsSrc").textContent = it.src + (ago ? "・" + ago : "");
      box.classList.remove("fading");
    };
    if (instant) { apply(); return; }
    box.classList.add("fading");
    setTimeout(apply, 420);
  }
  function applyNews(items) {
    newsItems = items;
    newsIdx = 0;
    if (!items.length) return;
    document.getElementById("newsRow").hidden = false;
    showNews(0, true);
    startNewsTimer();
  }
  function startNewsTimer() {
    if (newsTimer) clearInterval(newsTimer);
    newsTimer = setInterval(function () {
      var row = document.getElementById("newsRow");
      if (row.classList.contains("off") || newsHover || newsItems.length < 2) return;
      newsIdx = (newsIdx + 1) % newsItems.length;
      showNews(newsIdx);
    }, 9000);
  }
  function newsStep(d) {
    if (!newsItems.length) return;
    newsIdx = (newsIdx + d + newsItems.length) % newsItems.length;
    showNews(newsIdx);
    startNewsTimer(); // 手動切換後重新計時，避免馬上又自動跳走
  }
  function fetchNewsFeed(u) {
    // 各家官方 RSS（不經 Google，避開代理遭擋）：即時、免金鑰；優先走 Worker 專線，不通時自動改走公用代理
    var routes = [
      function (x) { return WORKER_URL + "/?url=" + encodeURIComponent(x); },
      function (x) { return "https://corsproxy.io/?url=" + encodeURIComponent(x); },
      function (x) { return "https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(x); }
    ];
    var i = 0;
    function next() {
      if (i >= routes.length) return Promise.reject(new Error("news unavailable"));
      var mk = routes[i++];
      return fetch(mk(u)).then(function (r) {
        if (!r.ok) throw new Error("news " + r.status);
        return r.text();
      }).then(function (tx) {
        if (tx.indexOf("<item>") < 0 && tx.indexOf("<entry") < 0) throw new Error("bad rss");
        return tx;
      }).catch(next);
    }
    return next();
  }
  // 解析 RSS：標題尾端「 - 來源」拆出來源名；只留 36 小時內、非廣宣的頭條
  function parseNewsRss(xml, tag, srcName) {
    var doc = new DOMParser().parseFromString(xml, "text/xml");
    var items = doc.getElementsByTagName("item");
    if (!items.length) items = doc.getElementsByTagName("entry"); // Atom 格式相容
    var out = [];
    for (var i = 0; i < items.length; i++) {
      var el = items[i];
      var get = function (name) {
        var n = el.getElementsByTagName(name)[0];
        return n ? n.textContent : "";
      };
      var title = get("title"), link = get("link"), pub = get("pubDate") || get("published") || get("updated"), src = get("source") || srcName || "中央社";
      if (!link) { var ln0 = el.getElementsByTagName("link")[0]; link = ln0 ? (ln0.getAttribute("href") || "") : ""; }
      var desc = (get("description") || get("summary") || "").replace(/<[^>]+>/g, " ").replace(/\(www\.reuters\.com[\s\S]*$/, "").replace(/\s+/g, " ").trim();
      if (desc.length > 190) desc = desc.slice(0, 190) + "…";
      var t0 = new Date(pub).getTime();
      if (!title || !isFinite(t0) || Date.now() - t0 > 36 * 60 * 60 * 1000) continue;
      if (NEWS_SKIP.test(title)) continue;
      if (link && NEWS_LINKSKIP.test(link)) continue;
      var sfx = " - " + src;
      if (src && title.length > sfx.length && title.slice(-sfx.length) === sfx) title = title.slice(0, -sfx.length);
      out.push({ tag: tag, title: title, url: link || "#", src: src, at: pub, d: desc });
    }
    return out;
  }
  function loadNews() {
    try {
      var c = JSON.parse(localStorage.getItem("news24d") || "null");
      if (c && c.items && c.items.length && Date.now() - c.t < 25 * 60 * 1000) { applyNews(c.items); return; }
    } catch (e) {}
    Promise.all(NEWS_FEEDS.map(function (f) {
      return fetchNewsFeed(f[1]).then(function (xml) {
        return parseNewsRss(xml, f[0], f[2]);
      }).catch(function () { return []; });
    })).then(function (groups) {
      // 同類多來源合併後依時間新→舊排序，再依 國際 > 財經 > 產業 優先序串接；標題去重，單一來源每類最多 3 則
      var out = [], seen = {};
      for (var g = 0; g < NEWS_ORDER.length; g++) {
        var pool = [];
        for (var f2 = 0; f2 < NEWS_FEEDS.length; f2++) {
          if (NEWS_FEEDS[f2][0] === NEWS_ORDER[g][0]) pool = pool.concat(groups[f2]);
        }
        pool.sort(function (a, b) { return new Date(b.at).getTime() - new Date(a.at).getTime(); });
        var n = 0, perSrc = {};
        for (var i = 0; i < pool.length && n < NEWS_ORDER[g][1]; i++) {
          var a2 = pool[i];
          if (!a2.title || seen[a2.title]) continue;
          if ((perSrc[a2.src] || 0) >= 3) continue;
          perSrc[a2.src] = (perSrc[a2.src] || 0) + 1;
          seen[a2.title] = 1; out.push(a2); n++;
        }
      }
      if (!out.length) return;
      try { localStorage.setItem("news24d", JSON.stringify({ t: Date.now(), items: out })); } catch (e) {}
      applyNews(out);
    });
  }
  (function () {
    var row = document.getElementById("newsRow"), btn = document.getElementById("newsBtn");
    row.addEventListener("mouseenter", function () { newsHover = true; });
    row.addEventListener("mouseleave", function () { newsHover = false; });
    // 懸浮閱讀：滑鼠移到新聞標題上，浮出摘要卡直接閱讀（RSS 內文首段）
    var pop = document.getElementById("newsPop"), itemBox = document.getElementById("newsItem");
    function escHtml(t) { return String(t).replace(/[&<>"]/g, function (c) { return c === "&" ? "&amp;" : c === "<" ? "&lt;" : c === ">" ? "&gt;" : "&quot;"; }); }
    itemBox.addEventListener("mouseenter", function () {
      var it = newsItems[newsIdx];
      if (!it || !it.d) return;
      var ago = newsAgo(it.at);
      pop.innerHTML = '<span class="np-t">' + escHtml(it.title) + '</span>' + escHtml(it.d) + '<span class="np-m">' + escHtml(it.src) + (ago ? "・" + ago : "") + '</span>';
      pop.hidden = false;
    });
    itemBox.addEventListener("mouseleave", function () { pop.hidden = true; });
    function setOn(on) {
      row.classList.toggle("off", !on);
      btn.classList.toggle("off", !on);
      btn.setAttribute("aria-label", on ? "隱藏新聞" : "顯示新聞");
      try { localStorage.setItem("newsOn24", on ? "1" : "0"); } catch (e) {}
    }
    btn.addEventListener("click", function () { setOn(row.classList.contains("off")); });
    document.getElementById("newsPrev").addEventListener("click", function () { newsStep(-1); });
    document.getElementById("newsNext").addEventListener("click", function () { newsStep(1); });
    var pref = "1";
    try { pref = localStorage.getItem("newsOn24") || "1"; } catch (e) {}
    setOn(pref !== "0");
  })();
  loadNews();
  setInterval(loadNews, 30 * 60 * 1000); // 每 30 分鐘更新一次（RSS 免額度，搭配快取保持新鮮）
})();
</script>
